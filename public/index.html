<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qaid 채팅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0c;
      --surface: #15151a;
      --surface-2: #1c1c23;
      --border: #2a2a35;
      --text: #f5f5f7;
      --text-dim: #8e8e93;
      --accent: #007aff;
      --repair: #ff9500;
      --service: #30d158;
      --danger: #ff453a;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* 로그인 화면 */
    .login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 20%, rgba(0, 122, 255, 0.15), transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(255, 149, 0, 0.1), transparent 50%),
                  var(--bg);
      z-index: 100;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .login-logo img {
      max-width: 200px;
      height: auto;
      background: white;
      padding: 12px 16px;
      border-radius: 12px;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .sidebar-logo img {
      max-width: 120px;
      height: auto;
      display: block;
    }

    .login-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .login-subtitle {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* select 드롭다운 스타일 */
    select.form-input {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath fill='%238e8e93' d='M6 8L0 0h12z'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 16px center;
      padding-right: 40px;
      cursor: pointer;
    }

    select.form-input option {
      background: var(--surface-2);
      color: var(--text);
    }

    .role-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .role-btn {
      padding: 16px 12px;
      background: var(--surface-2);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .role-btn .icon { font-size: 24px; }

    .role-btn:hover { border-color: var(--accent); }

    .role-btn.active.repair {
      border-color: var(--repair);
      background: rgba(255, 149, 0, 0.1);
    }

    .role-btn.active.service {
      border-color: var(--service);
      background: rgba(48, 209, 88, 0.1);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 채팅 화면 */
    .chat-screen {
      display: none;
      height: 100vh;
      grid-template-columns: 260px 1fr;
    }

    .chat-screen.active { display: grid; }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .sidebar-subtitle {
      font-size: 12px;
      color: var(--text-dim);
    }

    .user-section {
      padding: 16px 20px;
      flex: 1;
      overflow-y: auto;
    }

    .user-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      font-size: 14px;
    }

    .user-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .user-dot.repair { background: var(--repair); }
    .user-dot.service { background: var(--service); }

    .user-name { font-weight: 500; }
    .user-role { font-size: 11px; color: var(--text-dim); margin-left: auto; }

    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .chat-header-title {
      font-size: 16px;
      font-weight: 700;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--service);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.disconnected {
      background: var(--danger);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--bg);
    }

    .messages::-webkit-scrollbar { width: 8px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      animation: slideIn 0.25s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.own { align-self: flex-end; align-items: flex-end; }
    .message.other { align-self: flex-start; }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .message-name { font-weight: 600; }
    .message-name.repair { color: var(--repair); }
    .message-name.service { color: var(--service); }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message.own .message-bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.other .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.system {
      align-self: center;
      max-width: 100%;
    }

    .message.system .message-bubble {
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .typing-indicator {
      padding: 8px 24px;
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      min-height: 28px;
    }

    .input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .message-input {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 22px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
    }

    .message-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    .send-btn:hover { opacity: 0.9; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .voice-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .voice-toggle:hover {
      border-color: var(--accent);
    }

    .voice-toggle.off {
      opacity: 0.5;
    }

    .voice-toggle.off #voiceIcon::before {
      content: '🔇';
    }

    /* 확인 체크박스 컨테이너 */
    .ack-container {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      padding: 6px 12px;
      background: rgba(255, 149, 0, 0.12);
      border: 1px solid rgba(255, 149, 0, 0.4);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
      user-select: none;
      animation: pulseAlert 1.5s ease-in-out infinite;
    }

    .ack-container:hover {
      background: rgba(255, 149, 0, 0.2);
      transform: translateY(-1px);
    }

    @keyframes pulseAlert {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 149, 0, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(255, 149, 0, 0); }
    }

    .ack-checkbox {
      width: 16px;
      height: 16px;
      border: 2px solid var(--repair);
      border-radius: 4px;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s;
    }

    .ack-label {
      color: var(--repair);
      font-weight: 600;
    }

    .ack-container.acknowledged {
      background: rgba(48, 209, 88, 0.12);
      border-color: rgba(48, 209, 88, 0.4);
      cursor: default;
      animation: none;
    }

    .ack-container.acknowledged .ack-checkbox {
      background: var(--service);
      border-color: var(--service);
    }

    .ack-container.acknowledged .ack-checkbox::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 0px;
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .ack-container.acknowledged .ack-label {
      color: var(--service);
    }

    .ack-info {
      margin-top: 4px;
      padding: 0 4px;
      font-size: 11px;
      color: var(--text-dim);
    }

    @media (max-width: 768px) {
      .chat-screen.active { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .message { max-width: 85%; }
    }
  </style>
</head>
<body>

  <!-- 로그인 화면 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <img src="/images/qaid-logo.jpeg" alt="Qaid" />
      </div>
      <p class="login-subtitle" style="text-align: center; margin-bottom: 32px;">센터, 이름, 부서를 선택해주세요</p>

      <div class="form-group">
        <label class="form-label">센터</label>
        <select class="form-input" id="centerSelect">
          <option value="">센터를 선택하세요</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">이름</label>
        <input type="text" class="form-input" id="nameInput" placeholder="홍길동" maxlength="20" />
      </div>

      <div class="form-group">
        <label class="form-label">부서</label>
        <div class="role-buttons">
          <button type="button" class="role-btn repair" data-role="repair">
            <span class="icon">🔧</span>
            <span>수리실</span>
          </button>
          <button type="button" class="role-btn service" data-role="service">
            <span class="icon">💬</span>
            <span>응대실</span>
          </button>
        </div>
      </div>

      <button class="submit-btn" id="joinBtn" disabled>입장하기</button>
    </div>
  </div>

  <!-- 채팅 화면 -->
  <div class="chat-screen" id="chatScreen">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="/images/qaid-logo.jpeg" alt="Qaid" />
        </div>
        <div class="sidebar-subtitle" id="currentCenter">실시간 커뮤니케이션</div>
      </div>
      <div class="user-section">
        <div class="user-section-title">접속자 <span id="userCount">0</span>명</div>
        <div id="userList"></div>
      </div>
    </aside>

    <main class="main">
      <header class="chat-header">
        <div class="chat-header-title" id="chatHeaderTitle">전체 채팅방</div>
        <div style="display: flex; align-items: center; gap: 16px;">
          <button id="voiceToggle" class="voice-toggle" title="음성 읽기 켜기/끄기">
            <span id="voiceIcon">🔊</span>
            <span id="voiceLabel">음성 ON</span>
          </button>
          <div class="connection-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">연결됨</span>
          </div>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <div class="typing-indicator" id="typingIndicator"></div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            class="message-input"
            id="messageInput"
            placeholder="메시지를 입력하세요... (Shift+Enter 줄바꿈)"
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" title="전송">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket = null;
    let myName = '';
    let myRole = '';
    let myCenter = '';
    let selectedRole = '';
    let typingTimer = null;

    // 페이지 로드 시 센터 목록 가져오기
    async function loadCenters() {
      try {
        const res = await fetch('/api/centers');
        const centers = await res.json();
        const select = document.getElementById('centerSelect');
        centers.forEach(c => {
          const option = document.createElement('option');
          option.value = c;
          option.textContent = c;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('센터 목록 로드 실패:', err);
        alert('센터 목록을 불러오지 못했습니다. 페이지를 새로고침 해주세요.');
      }
    }
    loadCenters();

    // 로그인 화면 핸들러
    const nameInput = document.getElementById('nameInput');
    const centerSelect = document.getElementById('centerSelect');
    const joinBtn = document.getElementById('joinBtn');
    const roleButtons = document.querySelectorAll('.role-btn');

    roleButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        roleButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRole = btn.dataset.role;
        validateForm();
      });
    });

    nameInput.addEventListener('input', validateForm);
    centerSelect.addEventListener('change', validateForm);

    function validateForm() {
      joinBtn.disabled = !(
        nameInput.value.trim() &&
        selectedRole &&
        centerSelect.value
      );
    }

    joinBtn.addEventListener('click', joinChat);
    nameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !joinBtn.disabled) joinChat();
    });

    function joinChat() {
      myName = nameInput.value.trim();
      myRole = selectedRole;
      myCenter = centerSelect.value;
      if (!myName || !myRole || !myCenter) return;

      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('chatScreen').classList.add('active');

      // 센터명 표시
      document.getElementById('currentCenter').textContent = `📍 ${myCenter}`;
      document.getElementById('chatHeaderTitle').textContent = `${myCenter} 채팅방`;
      document.title = `Qaid · ${myCenter}`;

      // 음성 토글 버튼: 수리실만 표시
      const vt = document.getElementById('voiceToggle');
      if (vt) {
        vt.style.display = (myRole === 'repair') ? 'flex' : 'none';
      }

      connectSocket();
    }

    function connectSocket() {
      socket = io();

      socket.on('connect', () => {
        updateStatus(true);
        socket.emit('join', { name: myName, role: myRole, center: myCenter });
      });

      socket.on('disconnect', () => updateStatus(false));

      socket.on('history', (history) => {
        history.forEach(msg => renderMessage(msg));
        scrollToBottom();
        // 수리실 입장 시: 아직 확인 안 된 응대실 메시지가 있으면 음성 반복 시작
        // (단, 너무 많은 메시지가 동시에 울리지 않게 가장 최근 미확인 메시지만)
        if (myRole === 'repair') {
          const unackedServiceMessages = history.filter(
            m => m.type === 'chat' && m.role === 'service' && !m.acknowledged && m.id
          );
          // 가장 최근 미확인 메시지 1개에만 반복 알림 (스팸 방지)
          if (unackedServiceMessages.length > 0) {
            const latest = unackedServiceMessages[unackedServiceMessages.length - 1];
            startRepeating(latest.id, latest.name, latest.text);
          }
        }
      });

      socket.on('message', (msg) => {
        renderMessage(msg);
        scrollToBottom();
        // 음성 재생: 응대실(service)이 보낸 메시지를 수리실(repair)에서만 읽어줌
        // 본인이 보낸 메시지는 읽지 않음
        if (
          msg.type === 'chat' &&
          msg.role === 'service' &&         // 보낸 사람이 응대실
          myRole === 'repair' &&            // 받는 사람이 수리실
          !(msg.name === myName && msg.role === myRole) // 본인 메시지 아님
        ) {
          // 즉시 음성 재생 + 10초 반복 등록
          speakMessage(msg.name, msg.text);
          startRepeating(msg.id, msg.name, msg.text);
        }
      });

      // 서버에서 확인(acknowledge) 완료 알림 수신
      socket.on('acknowledged', ({ messageId, acknowledgedBy, acknowledgedAt }) => {
        // 1. 해당 메시지의 음성 반복 중단
        stopRepeating(messageId);

        // 2. UI 업데이트 - 체크박스 상태 변경
        const ackEl = document.querySelector(`.ack-container[data-ack-for="${messageId}"]`);
        if (ackEl) {
          ackEl.classList.add('acknowledged');
          const labelEl = ackEl.querySelector('.ack-label');
          if (labelEl) labelEl.textContent = '확인 완료';
          // 클릭 이벤트 제거 (이미 확인됨)
          ackEl.style.pointerEvents = 'none';
        }

        // 3. 확인 정보 표시/업데이트
        const ackTime = new Date(acknowledgedAt).toLocaleTimeString('ko-KR', {
          hour: '2-digit', minute: '2-digit'
        });
        const messageDiv = document.querySelector(`.message[data-message-id="${messageId}"]`);
        if (messageDiv) {
          let infoEl = messageDiv.querySelector('.ack-info');
          if (!infoEl) {
            infoEl = document.createElement('div');
            infoEl.className = 'ack-info';
            infoEl.dataset.ackInfoFor = messageId;
            messageDiv.appendChild(infoEl);
          }
          infoEl.textContent = `✓ ${acknowledgedBy}님이 ${ackTime}에 확인`;
        }
      });

      socket.on('users', (users) => updateUserList(users));

      socket.on('typing', ({ name, role, isTyping }) => {
        const indicator = document.getElementById('typingIndicator');
        indicator.textContent = isTyping
          ? `${role === 'repair' ? '🔧' : '💬'} ${name}님이 입력 중...`
          : '';
      });
    }

    function updateStatus(connected) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (connected) {
        dot.classList.remove('disconnected');
        text.textContent = '연결됨';
      } else {
        dot.classList.add('disconnected');
        text.textContent = '연결 끊김';
      }
    }

    function updateUserList(users) {
      document.getElementById('userCount').textContent = users.length;
      const list = document.getElementById('userList');
      list.innerHTML = '';
      users.forEach(user => {
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `
          <span class="user-dot ${user.role}"></span>
          <span class="user-name">${escapeHtml(user.name)}</span>
          <span class="user-role">${user.role === 'repair' ? '수리실' : '응대실'}</span>
        `;
        list.appendChild(div);
      });
    }

    function renderMessage(msg) {
      const messagesEl = document.getElementById('messages');
      const div = document.createElement('div');
      const time = new Date(msg.timestamp).toLocaleTimeString('ko-KR', {
        hour: '2-digit',
        minute: '2-digit'
      });

      if (msg.type === 'system') {
        div.className = 'message system';
        div.innerHTML = `<div class="message-bubble">${escapeHtml(msg.text)}</div>`;
      } else {
        const isOwn = msg.name === myName && msg.role === myRole;
        div.className = `message ${isOwn ? 'own' : 'other'}`;
        if (msg.id) div.dataset.messageId = msg.id;
        const roleIcon = msg.role === 'repair' ? '🔧' : '💬';
        const roleLabel = msg.role === 'repair' ? '수리실' : '응대실';

        let html = `
          <div class="message-meta">
            <span class="message-name ${msg.role}">${roleIcon} ${escapeHtml(msg.name)} · ${roleLabel}</span>
            <span>${time}</span>
          </div>
          <div class="message-bubble">${escapeHtml(msg.text)}</div>
        `;

        // 응대실 메시지인데 내가 수리실이면 → 확인 체크박스 표시
        if (msg.role === 'service' && myRole === 'repair') {
          const isAcked = msg.acknowledged === true;
          html += `
            <div class="ack-container ${isAcked ? 'acknowledged' : ''}" data-ack-for="${msg.id}">
              <div class="ack-checkbox"></div>
              <span class="ack-label">${isAcked ? '확인 완료' : '확인하기'}</span>
            </div>
          `;
          if (isAcked && msg.acknowledgedBy) {
            const ackTime = msg.acknowledgedAt
              ? new Date(msg.acknowledgedAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
              : '';
            html += `<div class="ack-info">${escapeHtml(msg.acknowledgedBy)}님이 ${ackTime}에 확인</div>`;
          }
        }
        // 응대실 메시지에 대한 확인 정보를 응대실 사용자도 볼 수 있게
        else if (msg.role === 'service' && myRole === 'service' && msg.acknowledged) {
          const ackTime = msg.acknowledgedAt
            ? new Date(msg.acknowledgedAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
            : '';
          html += `<div class="ack-info" data-ack-info-for="${msg.id}">✓ ${escapeHtml(msg.acknowledgedBy)}님이 ${ackTime}에 확인</div>`;
        }
        // 아직 확인 안 된 응대실 메시지를 응대실 본인도 추적할 수 있게 빈 컨테이너
        else if (msg.role === 'service' && myRole === 'service' && !msg.acknowledged) {
          html += `<div class="ack-info" data-ack-info-for="${msg.id}">⏳ 수리실 확인 대기 중</div>`;
        }

        div.innerHTML = html;

        // 체크박스 클릭 이벤트 (수리실만)
        const ackEl = div.querySelector('.ack-container');
        if (ackEl && !ackEl.classList.contains('acknowledged')) {
          ackEl.addEventListener('click', () => {
            acknowledgeMessage(msg.id);
          });
        }
      }
      messagesEl.appendChild(div);
    }

    function scrollToBottom() {
      const messagesEl = document.getElementById('messages');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 메시지 전송
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !socket) return;
      socket.emit('message', text);
      messageInput.value = '';
      messageInput.style.height = 'auto';
      socket.emit('typing', false);
    }

    sendBtn.addEventListener('click', sendMessage);

    // 한글 IME(입력기) 조합 상태 추적
    // 한글 입력 중에는 Enter가 두 번 발생하는 문제를 방지
    let isComposing = false;

    messageInput.addEventListener('compositionstart', () => {
      isComposing = true;
    });

    messageInput.addEventListener('compositionend', () => {
      isComposing = false;
    });

    messageInput.addEventListener('keydown', (e) => {
      // 한글 조합 중이거나 IME 처리 중인 Enter는 무시
      if (e.isComposing || isComposing || e.keyCode === 229) return;

      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 자동 높이 조절 + 타이핑 표시
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';

      if (socket) {
        socket.emit('typing', true);
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => socket.emit('typing', false), 1000);
      }
    });

    // ========== 음성 합성 (TTS) ==========
    // 응대실 → 수리실 방향 메시지만 음성으로 읽어줌
    let voiceEnabled = true;
    let koreanVoice = null;
    const voiceToggle = document.getElementById('voiceToggle');
    const voiceLabel = document.getElementById('voiceLabel');

    // 사용 가능한 음성 목록 로드 (한국어 우선)
    function loadVoices() {
      if (!('speechSynthesis' in window)) return;
      const voices = speechSynthesis.getVoices();
      // 한국어 음성 찾기 (Mac은 'Yuna', Windows는 'Microsoft Heami' 등)
      koreanVoice = voices.find(v => v.lang === 'ko-KR') ||
                    voices.find(v => v.lang.startsWith('ko')) ||
                    null;
    }

    if ('speechSynthesis' in window) {
      loadVoices();
      // 일부 브라우저는 비동기로 음성 목록을 로드함
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    // 음성으로 메시지 읽기
    function speakMessage(name, text) {
      if (!voiceEnabled || !('speechSynthesis' in window)) return;

      // 현재 재생 중인 음성이 있으면 큐에 쌓이지 않게 정리
      // (메시지가 빠르게 오면 끊기지만 최신 메시지가 우선)
      const utterance = new SpeechSynthesisUtterance(`${name}님. ${text}`);
      utterance.lang = 'ko-KR';
      utterance.rate = 1.0;   // 속도 (0.1 ~ 10)
      utterance.pitch = 1.0;  // 음높이 (0 ~ 2)
      utterance.volume = 1.0; // 볼륨 (0 ~ 1)

      if (koreanVoice) {
        utterance.voice = koreanVoice;
      }

      speechSynthesis.speak(utterance);
    }

    // 음성 ON/OFF 토글
    voiceToggle.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      if (voiceEnabled) {
        voiceToggle.classList.remove('off');
        voiceLabel.textContent = '음성 ON';
      } else {
        voiceToggle.classList.add('off');
        voiceLabel.textContent = '음성 OFF';
        speechSynthesis.cancel(); // 현재 재생 중인 음성 중지
        // 모든 반복 알림도 중지
        stopAllRepeating();
      }
    });

    // ========== 메시지 확인 (Acknowledge) & 반복 알림 ==========

    // 메시지별 반복 타이머 저장: messageId -> intervalId
    const repeatTimers = new Map();
    const REPEAT_INTERVAL = 10000; // 10초

    // 체크박스 클릭 → 서버에 확인 요청 전송
    function acknowledgeMessage(messageId) {
      if (!socket || !messageId) return;
      if (myRole !== 'repair') return;
      socket.emit('acknowledge', messageId);
      // 즉시 로컬에서도 반복 중지 (서버 응답 기다리지 않음)
      stopRepeating(messageId);
    }

    // 특정 메시지에 대해 10초마다 음성 반복 시작
    function startRepeating(messageId, name, text) {
      if (!messageId) return;
      if (myRole !== 'repair') return;
      // 이미 등록되어 있으면 중복 등록 방지
      if (repeatTimers.has(messageId)) return;

      const timerId = setInterval(() => {
        // 음성이 꺼져 있으면 재생 안 함 (하지만 타이머는 유지)
        if (voiceEnabled) {
          speakMessage(name, text);
        }
      }, REPEAT_INTERVAL);

      repeatTimers.set(messageId, timerId);
    }

    // 특정 메시지의 음성 반복 중지
    function stopRepeating(messageId) {
      if (!messageId) return;
      const timerId = repeatTimers.get(messageId);
      if (timerId) {
        clearInterval(timerId);
        repeatTimers.delete(messageId);
      }
    }

    // 모든 반복 알림 중지
    function stopAllRepeating() {
      repeatTimers.forEach(id => clearInterval(id));
      repeatTimers.clear();
    }

  </script>
</body>
</html>
