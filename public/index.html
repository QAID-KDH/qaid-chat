<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qaid 채팅</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* 큐에이드 브랜드 컬러 */
      --brand: #327CDB;
      --brand-hover: #2569C4;
      --brand-light: #E8F2FC;
      --brand-50: #F4F9FE;

      /* 라이트 모드 색상 */
      --bg: #FAFBFC;
      --surface: #FFFFFF;
      --surface-2: #F4F6F9;
      --border: #E5E8EC;
      --border-strong: #D5D9E0;
      --text: #1A1D24;
      --text-secondary: #4B5563;
      --text-dim: #9098A4;

      /* 부서 색상 */
      --repair: #E07B00;
      --repair-bg: #FFF6E6;
      --service: #1F9D55;
      --service-bg: #E8F5EE;
      --danger: #E11D48;
      --danger-bg: #FEF1F2;

      /* 그림자 */
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 12px 40px rgba(50, 124, 219, 0.12);
    }

    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
    }

    /* ============ 로그인 화면 ============ */
    .login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(50, 124, 219, 0.08), transparent 60%),
        radial-gradient(ellipse 80% 60% at 80% 100%, rgba(50, 124, 219, 0.06), transparent 60%),
        var(--bg);
      z-index: 100;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }

    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .login-logo img {
      max-width: 180px;
      height: auto;
    }

    .login-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 32px;
      font-weight: 400;
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .form-input {
      width: 100%;
      padding: 13px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .form-input::placeholder {
      color: var(--text-dim);
      font-weight: 400;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(50, 124, 219, 0.12);
    }

    /* select 드롭다운 */
    select.form-input {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath fill='%239098A4' d='M6 8L0 0h12z'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 36px;
      cursor: pointer;
    }

    select.form-input option {
      background: var(--surface);
      color: var(--text);
    }

    .role-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .role-btn {
      padding: 14px 12px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .role-btn .icon { font-size: 22px; }

    .role-btn:hover {
      border-color: var(--brand);
      background: var(--brand-50);
    }

    .role-btn.active.repair {
      border-color: var(--repair);
      background: var(--repair-bg);
      color: var(--repair);
    }

    .role-btn.active.service {
      border-color: var(--service);
      background: var(--service-bg);
      color: var(--service);
    }

    .error-message {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      min-height: 18px;
      font-weight: 500;
    }

    .error-message.success { color: var(--service); }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: background 0.15s ease, transform 0.05s ease;
      letter-spacing: -0.01em;
    }

    .submit-btn:hover:not(:disabled) { background: var(--brand-hover); }
    .submit-btn:active:not(:disabled) { transform: translateY(1px); }
    .submit-btn:disabled {
      background: var(--border-strong);
      color: var(--text-dim);
      cursor: not-allowed;
    }

    /* ============ 채팅 화면 ============ */
    .chat-screen {
      display: none;
      height: 100vh;
      grid-template-columns: 260px 1fr;
      background: var(--bg);
    }

    .chat-screen.active { display: grid; }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }

    .sidebar-logo img {
      max-width: 110px;
      height: auto;
      display: block;
    }

    .sidebar-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-top: 6px;
    }

    .user-section {
      padding: 18px 20px;
      flex: 1;
      overflow-y: auto;
    }

    .user-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      font-size: 13px;
    }

    .user-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .user-dot.repair { background: var(--repair); }
    .user-dot.service { background: var(--service); }

    .user-name { font-weight: 600; color: var(--text); }
    .user-role { font-size: 11px; color: var(--text-dim); margin-left: auto; font-weight: 500; }

    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .chat-header-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }

    .voice-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s ease;
    }

    .voice-toggle:hover {
      border-color: var(--brand);
      color: var(--brand);
    }

    .voice-toggle.off { opacity: 0.6; }
    .voice-toggle.off #voiceIcon::before { content: '🔇'; }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--service);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.disconnected {
      background: var(--danger);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg);
    }

    .messages::-webkit-scrollbar { width: 8px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 4px;
    }
    .messages::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.own { align-self: flex-end; align-items: flex-end; }
    .message.other { align-self: flex-start; }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 5px;
      padding: 0 4px;
      font-weight: 500;
    }

    .message-name { font-weight: 700; }
    .message-name.repair { color: var(--repair); }
    .message-name.service { color: var(--service); }

    .message-bubble {
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-weight: 500;
      position: relative;
    }

    /* 메시지 호버 시 삭제 버튼 표시 */
    .message.own {
      position: relative;
      /* 좌측에 X 버튼 영역 padding 추가 - hover 영역 확장 */
      padding-left: 36px;
    }

    .delete-btn {
      position: absolute;
      /* 메시지 박스에 살짝 걸치게 배치 - hover가 끊기지 않음 */
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow-md);
      transition: opacity 0.15s ease, transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      padding: 0;
      z-index: 5;
      line-height: 1;
    }

    .delete-btn:hover {
      background: var(--danger);
      border-color: var(--danger);
      color: white;
      transform: translateY(-50%) scale(1.1);
    }

    /* 본인 메시지 영역 전체에 호버하면 삭제 버튼 표시 */
    /* padding-left로 확장된 영역까지 모두 hover 가능 */
    .message.own:hover .delete-btn {
      opacity: 1;
      pointer-events: auto;
    }

    /* 모바일에서는 항상 보이게 (호버 없으므로) */
    @media (hover: none) {
      .message.own .delete-btn {
        opacity: 0.7;
        pointer-events: auto;
      }
      .message.own .delete-btn:active {
        opacity: 1;
      }
    }

    /* 삭제된 메시지 스타일 */
    .message.deleted .message-bubble {
      background: var(--surface-2) !important;
      color: var(--text-dim) !important;
      font-style: italic;
      font-weight: 400;
      border: 1px dashed var(--border-strong) !important;
      box-shadow: none !important;
    }

    .message.deleted {
      padding-left: 0 !important;
    }

    .message.deleted .delete-btn {
      display: none !important;
    }

    /* 삭제된 메시지는 호버 시에도 X 버튼 표시 안 함 */
    .message.deleted:hover .delete-btn {
      display: none !important;
    }

    .message.deleted .ack-container {
      display: none !important;
    }

    .message.own .message-bubble {
      background: var(--brand);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.other .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    .message.system {
      align-self: center;
      max-width: 100%;
    }

    .message.system .message-bubble {
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-weight: 500;
      box-shadow: none;
    }

    /* 확인 체크박스 (수리실에서만 표시) */
    .ack-container {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      padding: 7px 12px;
      background: var(--repair-bg);
      border: 1px solid var(--repair);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 12px;
      font-weight: 600;
      user-select: none;
      animation: pulseAlert 1.5s ease-in-out infinite;
    }

    .ack-container:hover {
      background: #FFE7BF;
      transform: translateY(-1px);
    }

    @keyframes pulseAlert {
      0%, 100% { box-shadow: 0 0 0 0 rgba(224, 123, 0, 0.35); }
      50% { box-shadow: 0 0 0 6px rgba(224, 123, 0, 0); }
    }

    .ack-checkbox {
      width: 16px;
      height: 16px;
      border: 2px solid var(--repair);
      border-radius: 4px;
      flex-shrink: 0;
      position: relative;
      transition: all 0.15s ease;
      background: white;
    }

    .ack-label {
      color: var(--repair);
      font-weight: 700;
    }

    .ack-container.acknowledged {
      background: var(--service-bg);
      border-color: var(--service);
      cursor: default;
      animation: none;
    }

    .ack-container.acknowledged .ack-checkbox {
      background: var(--service);
      border-color: var(--service);
    }

    .ack-container.acknowledged .ack-checkbox::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 0px;
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .ack-container.acknowledged .ack-label {
      color: var(--service);
    }

    .ack-info {
      margin-top: 4px;
      padding: 0 4px;
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .typing-indicator {
      padding: 8px 24px;
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      min-height: 28px;
      background: var(--bg);
    }

    .input-area {
      padding: 16px 24px 22px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .message-input {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      resize: none;
      line-height: 1.4;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .message-input::placeholder {
      color: var(--text-dim);
      font-weight: 400;
    }

    .message-input:focus {
      outline: none;
      border-color: var(--brand);
      background: var(--surface);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--brand);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s ease, transform 0.05s ease;
      box-shadow: 0 2px 8px rgba(50, 124, 219, 0.3);
    }

    .send-btn:hover:not(:disabled) { background: var(--brand-hover); }
    .send-btn:active:not(:disabled) { transform: scale(0.95); }
    .send-btn:disabled {
      background: var(--border-strong);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* 시각 알림 효과 - 메시지 영역 깜빡임 (확인하기 클릭 전까지 지속) */
    .messages.alert-flash {
      animation: alertFlash 1.2s ease-in-out infinite;
    }

    @keyframes alertFlash {
      0%, 100% {
        background: var(--bg);
        box-shadow: inset 0 0 0 0 rgba(225, 29, 72, 0);
      }
      50% {
        background: var(--danger-bg);
        box-shadow: inset 0 0 0 4px var(--danger);
      }
    }

    @media (max-width: 768px) {
      .chat-screen.active { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .message { max-width: 85%; }
    }
  </style>
</head>
<body>

  <!-- 로그인 화면 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <img src="/images/qaid-logo.jpeg" alt="Qaid" />
      </div>
      <p class="login-subtitle">센터, 이름, 업무 위치를 선택해주세요</p>

      <div class="form-group">
        <label class="form-label">센터</label>
        <select class="form-input" id="centerSelect">
          <option value="">센터를 선택하세요</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">이름</label>
        <input type="text" class="form-input" id="nameInput" placeholder="홍길동" maxlength="20" />
      </div>

      <div class="form-group">
        <label class="form-label">업무 위치</label>
        <div class="role-buttons">
          <button type="button" class="role-btn repair" data-role="repair">
            <span class="icon">🔧</span>
            <span>수리실</span>
          </button>
          <button type="button" class="role-btn service" data-role="service">
            <span class="icon">💬</span>
            <span>고객대기실</span>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input
          type="password"
          class="form-input"
          id="passwordInput"
          placeholder="센터 비밀번호를 입력하세요"
          inputmode="numeric"
          autocomplete="off"
        />
        <div class="error-message" id="errorMessage"></div>
      </div>

      <button class="submit-btn" id="joinBtn" disabled>입장하기</button>
    </div>
  </div>

  <!-- 채팅 화면 -->
  <div class="chat-screen" id="chatScreen">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="/images/qaid-logo.jpeg" alt="Qaid" />
        </div>
        <div class="sidebar-subtitle" id="currentCenter">실시간 커뮤니케이션</div>
      </div>
      <div class="user-section">
        <div class="user-section-title">접속자 <span id="userCount">0</span>명</div>
        <div id="userList"></div>
      </div>
    </aside>

    <main class="main">
      <header class="chat-header">
        <div class="chat-header-title" id="chatHeaderTitle">전체 채팅방</div>
        <div style="display: flex; align-items: center; gap: 12px;">
          <button id="voiceToggle" class="voice-toggle" title="음성 읽기 켜기/끄기">
            <span id="voiceIcon">🔊</span>
            <span id="voiceLabel">음성 ON</span>
          </button>
          <div class="connection-status">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">연결됨</span>
          </div>
        </div>
      </header>

      <div class="messages" id="messages"></div>

      <div class="typing-indicator" id="typingIndicator"></div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            class="message-input"
            id="messageInput"
            placeholder="메시지를 입력하세요... (Shift+Enter 줄바꿈)"
            rows="1"
          ></textarea>
          <button class="send-btn" id="sendBtn" title="전송">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket = null;
    let myName = '';
    let myRole = '';
    let myCenter = '';
    let myPassword = '';
    let selectedRole = '';
    let typingTimer = null;

    // 페이지 로드 시 센터 목록 가져오기
    async function loadCenters() {
      try {
        const res = await fetch('/api/centers');
        const centers = await res.json();
        const select = document.getElementById('centerSelect');
        centers.forEach(c => {
          const option = document.createElement('option');
          option.value = c;
          option.textContent = c;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('센터 목록 로드 실패:', err);
        alert('센터 목록을 불러오지 못했습니다. 페이지를 새로고침 해주세요.');
      }
    }
    loadCenters();

    // 로그인 화면 핸들러
    const nameInput = document.getElementById('nameInput');
    const centerSelect = document.getElementById('centerSelect');
    const passwordInput = document.getElementById('passwordInput');
    const errorMessage = document.getElementById('errorMessage');
    const joinBtn = document.getElementById('joinBtn');
    const roleButtons = document.querySelectorAll('.role-btn');

    roleButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        roleButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRole = btn.dataset.role;
        validateForm();
      });
    });

    nameInput.addEventListener('input', validateForm);
    centerSelect.addEventListener('change', validateForm);
    passwordInput.addEventListener('input', () => {
      validateForm();
      errorMessage.textContent = ''; // 입력 시작하면 에러 메시지 제거
    });

    function validateForm() {
      joinBtn.disabled = !(
        nameInput.value.trim() &&
        selectedRole &&
        centerSelect.value &&
        passwordInput.value.trim()
      );
    }

    joinBtn.addEventListener('click', joinChat);
    nameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !joinBtn.disabled) joinChat();
    });
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !joinBtn.disabled) joinChat();
    });

    async function joinChat() {
      const inputName = nameInput.value.trim();
      const inputRole = selectedRole;
      const inputCenter = centerSelect.value;
      const inputPassword = passwordInput.value.trim();

      if (!inputName || !inputRole || !inputCenter || !inputPassword) return;

      // 버튼 비활성화 + 로딩 표시
      joinBtn.disabled = true;
      joinBtn.textContent = '인증 중...';
      errorMessage.textContent = '';
      errorMessage.classList.remove('success');

      try {
        // 서버에 비밀번호 검증 요청
        const res = await fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            center: inputCenter,
            password: inputPassword
          })
        });

        const data = await res.json();

        if (!data.success) {
          errorMessage.textContent = data.message || '인증 실패';
          joinBtn.disabled = false;
          joinBtn.textContent = '입장하기';

          // 차단된 경우 카운트다운 표시
          if (data.locked && data.secondsLeft) {
            startLockoutCountdown(data.secondsLeft);
          }
          return;
        }

        // 인증 성공 → 채팅방 입장
        myName = inputName;
        myRole = inputRole;
        myCenter = inputCenter;
        myPassword = inputPassword;

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('chatScreen').classList.add('active');

        // 센터명 표시
        document.getElementById('currentCenter').textContent = `📍 ${myCenter}`;
        document.getElementById('chatHeaderTitle').textContent = `${myCenter} 채팅방`;
        document.title = `Qaid · ${myCenter}`;

        // 음성 토글 버튼: 수리실만 표시
        const vt = document.getElementById('voiceToggle');
        if (vt) {
          vt.style.display = (myRole === 'repair') ? 'flex' : 'none';
        }

        connectSocket();
      } catch (err) {
        console.error('인증 요청 실패:', err);
        errorMessage.textContent = '서버 연결 실패. 잠시 후 다시 시도해주세요.';
        joinBtn.disabled = false;
        joinBtn.textContent = '입장하기';
      }
    }

    // 차단 시 카운트다운 표시
    let lockoutInterval = null;
    function startLockoutCountdown(seconds) {
      joinBtn.disabled = true;
      clearInterval(lockoutInterval);

      const updateMessage = () => {
        if (seconds <= 0) {
          clearInterval(lockoutInterval);
          errorMessage.textContent = '다시 시도하실 수 있습니다.';
          joinBtn.disabled = false;
          joinBtn.textContent = '입장하기';
          validateForm();
          return;
        }
        errorMessage.textContent = `차단됨. ${seconds}초 후 다시 시도해주세요.`;
        seconds--;
      };

      updateMessage();
      lockoutInterval = setInterval(updateMessage, 1000);
    }

    function connectSocket() {
      socket = io();

      socket.on('connect', () => {
        updateStatus(true);
        socket.emit('join', {
          name: myName,
          role: myRole,
          center: myCenter,
          password: myPassword
        });
      });

      socket.on('disconnect', () => updateStatus(false));

      socket.on('history', (history) => {
        history.forEach(msg => renderMessage(msg));
        scrollToBottom();
        // 수리실 입장 시: 아직 확인 안 된 응대실 메시지가 있으면 음성 반복 시작
        // (단, 너무 많은 메시지가 동시에 울리지 않게 가장 최근 미확인 메시지만)
        if (myRole === 'repair') {
          const unackedServiceMessages = history.filter(
            m => m.type === 'chat' && m.role === 'service' && !m.acknowledged && !m.deleted && m.id
          );
          // 가장 최근 미확인 메시지 1개에만 반복 알림 (스팸 방지)
          if (unackedServiceMessages.length > 0) {
            const latest = unackedServiceMessages[unackedServiceMessages.length - 1];
            startRepeating(latest.id, latest.name, latest.text);
            // 미확인 메시지가 있으면 시각 알림도 시작 (재접속 시에도 인지 가능)
            startVisualAlert();
          }
        }
      });

      socket.on('message', (msg) => {
        renderMessage(msg);
        scrollToBottom();
        // 음성 재생: 응대실(service)이 보낸 메시지를 수리실(repair)에서만 읽어줌
        // 본인이 보낸 메시지는 읽지 않음, 삭제된 메시지도 읽지 않음
        if (
          msg.type === 'chat' &&
          !msg.deleted &&                   // 삭제된 메시지 아님
          msg.role === 'service' &&         // 보낸 사람이 응대실
          myRole === 'repair' &&            // 받는 사람이 수리실
          !(msg.name === myName && msg.role === myRole) // 본인 메시지 아님
        ) {
          // 첫 알림: 비프음 + 시각 알림 시작 + 음성 재생
          playBeep();
          startVisualAlert(); // 확인 전까지 계속 깜빡임
          speakMessage(msg.name, msg.text);
          // 10초 반복 등록 (반복 시에는 비프음 없이 음성만, 시각 알림은 이미 진행 중)
          startRepeating(msg.id, msg.name, msg.text);
        }
      });

      // 서버에서 확인(acknowledge) 완료 알림 수신
      socket.on('acknowledged', ({ messageId, acknowledgedBy, acknowledgedAt }) => {
        // 1. 해당 메시지의 음성 반복 중단
        stopRepeating(messageId);

        // 1-1. 시각 알림 중단 (수리실에서만 활성화된 상태였음)
        if (myRole === 'repair') {
          stopVisualAlert();
        }

        // 2. UI 업데이트 - 체크박스 상태 변경
        const ackEl = document.querySelector(`.ack-container[data-ack-for="${messageId}"]`);
        if (ackEl) {
          ackEl.classList.add('acknowledged');
          const labelEl = ackEl.querySelector('.ack-label');
          if (labelEl) labelEl.textContent = '확인 완료';
          // 클릭 이벤트 제거 (이미 확인됨)
          ackEl.style.pointerEvents = 'none';
        }

        // 3. 확인 정보 표시/업데이트
        const ackTime = new Date(acknowledgedAt).toLocaleTimeString('ko-KR', {
          hour: '2-digit', minute: '2-digit'
        });
        const messageDiv = document.querySelector(`.message[data-message-id="${messageId}"]`);
        if (messageDiv) {
          let infoEl = messageDiv.querySelector('.ack-info');
          if (!infoEl) {
            infoEl = document.createElement('div');
            infoEl.className = 'ack-info';
            infoEl.dataset.ackInfoFor = messageId;
            messageDiv.appendChild(infoEl);
          }
          infoEl.textContent = `✓ ${acknowledgedBy}님이 ${ackTime}에 확인`;
        }
      });

      // 서버에서 메시지 삭제 알림 수신
      socket.on('deleted', ({ messageId, deletedAt }) => {
        // 1. 진행 중인 음성 반복 즉시 중단 (모든 사용자)
        stopRepeating(messageId);

        // 2. 수리실 사용자에게만 음성/시각 알림 중단 처리
        // 고객대기실에서는 어차피 음성이 재생되지 않으므로,
        // speechSynthesis.cancel()을 호출하면 불필요한 딜레이만 발생
        if (myRole === 'repair') {
          // 시각 알림 중단
          stopVisualAlert();

          // 현재 재생 중인 음성도 중단 (수리실에서만)
          if ('speechSynthesis' in window) {
            speechSynthesis.cancel();
          }
        }

        // 3. UI 업데이트 - 메시지를 삭제된 상태로 변경
        const messageDiv = document.querySelector(`.message[data-message-id="${messageId}"]`);
        if (messageDiv) {
          messageDiv.classList.add('deleted');
          const bubble = messageDiv.querySelector('.message-bubble');
          if (bubble) bubble.textContent = '⊘ 삭제된 메시지입니다.';
          // 확인 체크박스/정보 제거
          const ackEl = messageDiv.querySelector('.ack-container');
          if (ackEl) ackEl.remove();
          const ackInfo = messageDiv.querySelector('.ack-info');
          if (ackInfo) ackInfo.remove();
          // 삭제 버튼 제거
          const deleteBtn = messageDiv.querySelector('.delete-btn');
          if (deleteBtn) deleteBtn.remove();
        }
      });

      socket.on('users', (users) => updateUserList(users));

      socket.on('typing', ({ name, role, isTyping }) => {
        const indicator = document.getElementById('typingIndicator');
        indicator.textContent = isTyping
          ? `${role === 'repair' ? '🔧' : '💬'} ${name}님이 입력 중...`
          : '';
      });
    }

    function updateStatus(connected) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (connected) {
        dot.classList.remove('disconnected');
        text.textContent = '연결됨';
      } else {
        dot.classList.add('disconnected');
        text.textContent = '연결 끊김';
      }
    }

    function updateUserList(users) {
      document.getElementById('userCount').textContent = users.length;
      const list = document.getElementById('userList');
      list.innerHTML = '';
      users.forEach(user => {
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `
          <span class="user-dot ${user.role}"></span>
          <span class="user-name">${escapeHtml(user.name)}</span>
          <span class="user-role">${user.role === 'repair' ? '수리실' : '고객대기실'}</span>
        `;
        list.appendChild(div);
      });
    }

    function renderMessage(msg) {
      const messagesEl = document.getElementById('messages');
      const div = document.createElement('div');
      const time = new Date(msg.timestamp).toLocaleTimeString('ko-KR', {
        hour: '2-digit',
        minute: '2-digit'
      });

      if (msg.type === 'system') {
        div.className = 'message system';
        div.innerHTML = `<div class="message-bubble">${escapeHtml(msg.text)}</div>`;
      } else {
        const isOwn = msg.name === myName && msg.role === myRole;
        const isDeleted = msg.deleted === true;
        div.className = `message ${isOwn ? 'own' : 'other'}${isDeleted ? ' deleted' : ''}`;
        if (msg.id) div.dataset.messageId = msg.id;
        const roleIcon = msg.role === 'repair' ? '🔧' : '💬';
        const roleLabel = msg.role === 'repair' ? '수리실' : '고객대기실';

        let html = `
          <div class="message-meta">
            <span class="message-name ${msg.role}">${roleIcon} ${escapeHtml(msg.name)} · ${roleLabel}</span>
            <span>${time}</span>
          </div>
          <div class="message-bubble">${escapeHtml(msg.text)}</div>
        `;

        // 본인이 보낸 메시지 + 삭제 안 된 메시지면 → 삭제 버튼 추가
        if (isOwn && !isDeleted && msg.id) {
          html += `
            <button class="delete-btn" data-delete-for="${msg.id}" title="삭제">✕</button>
          `;
        }

        // 응대실 메시지인데 내가 수리실이면 → 확인 체크박스 표시 (삭제된 메시지는 제외)
        if (!isDeleted && msg.role === 'service' && myRole === 'repair') {
          const isAcked = msg.acknowledged === true;
          html += `
            <div class="ack-container ${isAcked ? 'acknowledged' : ''}" data-ack-for="${msg.id}">
              <div class="ack-checkbox"></div>
              <span class="ack-label">${isAcked ? '확인 완료' : '확인하기'}</span>
            </div>
          `;
          if (isAcked && msg.acknowledgedBy) {
            const ackTime = msg.acknowledgedAt
              ? new Date(msg.acknowledgedAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
              : '';
            html += `<div class="ack-info">${escapeHtml(msg.acknowledgedBy)}님이 ${ackTime}에 확인</div>`;
          }
        }
        // 응대실 메시지에 대한 확인 정보를 응대실 사용자도 볼 수 있게 (삭제된 메시지 제외)
        else if (!isDeleted && msg.role === 'service' && myRole === 'service' && msg.acknowledged) {
          const ackTime = msg.acknowledgedAt
            ? new Date(msg.acknowledgedAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
            : '';
          html += `<div class="ack-info" data-ack-info-for="${msg.id}">✓ ${escapeHtml(msg.acknowledgedBy)}님이 ${ackTime}에 확인</div>`;
        }
        // 아직 확인 안 된 응대실 메시지를 응대실 본인도 추적할 수 있게 빈 컨테이너 (삭제된 메시지 제외)
        else if (!isDeleted && msg.role === 'service' && myRole === 'service' && !msg.acknowledged) {
          html += `<div class="ack-info" data-ack-info-for="${msg.id}">⏳ 수리실 확인 대기 중</div>`;
        }

        div.innerHTML = html;

        // 체크박스 클릭 이벤트 (수리실만)
        const ackEl = div.querySelector('.ack-container');
        if (ackEl && !ackEl.classList.contains('acknowledged')) {
          ackEl.addEventListener('click', () => {
            acknowledgeMessage(msg.id);
          });
        }

        // 삭제 버튼 클릭 이벤트
        const deleteBtn = div.querySelector('.delete-btn');
        if (deleteBtn) {
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm('이 메시지를 삭제하시겠습니까?\n\n삭제된 메시지는 모든 사용자에게 "⊘ 삭제된 메시지"로 표시됩니다.')) {
              deleteMessage(msg.id);
            }
          });
        }
      }
      messagesEl.appendChild(div);
    }

    function scrollToBottom() {
      const messagesEl = document.getElementById('messages');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 메시지 전송
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !socket) return;
      socket.emit('message', text);
      messageInput.value = '';
      messageInput.style.height = 'auto';
      socket.emit('typing', false);
    }

    sendBtn.addEventListener('click', sendMessage);

    // 한글 IME(입력기) 조합 상태 추적
    // 한글 입력 중에는 Enter가 두 번 발생하는 문제를 방지
    let isComposing = false;

    messageInput.addEventListener('compositionstart', () => {
      isComposing = true;
    });

    messageInput.addEventListener('compositionend', () => {
      isComposing = false;
    });

    messageInput.addEventListener('keydown', (e) => {
      // 한글 조합 중이거나 IME 처리 중인 Enter는 무시
      if (e.isComposing || isComposing || e.keyCode === 229) return;

      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 자동 높이 조절 + 타이핑 표시
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';

      if (socket) {
        socket.emit('typing', true);
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => socket.emit('typing', false), 1000);
      }
    });

    // ========== 음성 합성 (TTS) + 비프음 + 시각 알림 ==========
    let voiceEnabled = true;
    let koreanVoice = null;
    const voiceToggle = document.getElementById('voiceToggle');
    const voiceLabel = document.getElementById('voiceLabel');

    // 사용 가능한 음성 목록 로드
    function loadVoices() {
      if (!('speechSynthesis' in window)) return;
      const voices = speechSynthesis.getVoices();
      koreanVoice = voices.find(v => v.lang === 'ko-KR') ||
                    voices.find(v => v.lang.startsWith('ko')) ||
                    null;
    }

    if ('speechSynthesis' in window) {
      loadVoices();
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    // Web Audio API context (비프음용)
    let audioContext = null;
    function getAudioContext() {
      if (!audioContext) {
        try {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.warn('Web Audio API 사용 불가');
        }
      }
      if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
      }
      return audioContext;
    }

    // 비프음 ("딩-동" 짧은 알림음) - 고정 음량 (깨짐 방지)
    function playBeep() {
      const ctx = getAudioContext();
      if (!ctx) return;

      const now = ctx.currentTime;

      // 압축기 - 클리핑 방지 (음질 깨짐 방지)
      const compressor = ctx.createDynamicsCompressor();
      compressor.threshold.setValueAtTime(-12, now);
      compressor.knee.setValueAtTime(8, now);
      compressor.ratio.setValueAtTime(4, now);
      compressor.attack.setValueAtTime(0.003, now);
      compressor.release.setValueAtTime(0.25, now);

      // 게인 노드 - 고정 음량 (안전한 수준)
      const gainNode = ctx.createGain();
      const fixedGain = 0.4; // 적정 수준 (깨지지 않는 음량)
      gainNode.gain.setValueAtTime(0, now);
      gainNode.gain.linearRampToValueAtTime(fixedGain, now + 0.02);
      gainNode.gain.setValueAtTime(fixedGain, now + 0.15);
      gainNode.gain.linearRampToValueAtTime(0, now + 0.35);

      // 첫 번째 음 ("딩") - 880Hz
      const osc1 = ctx.createOscillator();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(880, now);
      osc1.connect(gainNode);
      osc1.start(now);
      osc1.stop(now + 0.15);

      // 두 번째 음 ("동") - 660Hz
      const osc2 = ctx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(660, now + 0.15);
      osc2.connect(gainNode);
      osc2.start(now + 0.15);
      osc2.stop(now + 0.35);

      gainNode.connect(compressor);
      compressor.connect(ctx.destination);
    }

    // 음성 재생 (브라우저 기본 TTS)
    function speakMessage(name, text) {
      if (!voiceEnabled || !('speechSynthesis' in window)) return;

      const utterance = new SpeechSynthesisUtterance(`${name}님. ${text}`);
      utterance.lang = 'ko-KR';
      utterance.rate = 1.0;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;

      if (koreanVoice) {
        utterance.voice = koreanVoice;
      }

      speechSynthesis.speak(utterance);
    }

    // 시각 알림 - 메시지 영역 깜빡임 + 페이지 제목 변경
    // 핵심: 확인하기 클릭(또는 메시지 삭제) 전까지 계속 깜빡임
    let titleFlashInterval = null;
    let originalTitle = '';
    let activeAlertCount = 0; // 활성 알림 개수 추적

    function startVisualAlert() {
      activeAlertCount++;

      // 메시지 영역에 깜빡임 클래스 추가 (CSS animation infinite)
      const messagesEl = document.getElementById('messages');
      if (messagesEl) {
        messagesEl.classList.add('alert-flash');
      }

      // 페이지 제목 깜빡임 (이미 동작 중이면 중복 시작 방지)
      if (!titleFlashInterval) {
        if (!originalTitle) originalTitle = document.title;
        let flashState = false;
        titleFlashInterval = setInterval(() => {
          flashState = !flashState;
          document.title = flashState ? '🔔 새 메시지!' : originalTitle;
        }, 800);
      }
    }

    function stopVisualAlert() {
      if (activeAlertCount > 0) activeAlertCount--;

      // 활성 알림이 모두 사라지면 시각 알림 중단
      if (activeAlertCount === 0) {
        const messagesEl = document.getElementById('messages');
        if (messagesEl) {
          messagesEl.classList.remove('alert-flash');
        }

        if (titleFlashInterval) {
          clearInterval(titleFlashInterval);
          titleFlashInterval = null;
        }
        if (originalTitle) {
          document.title = originalTitle;
        }
      }
    }

    // 음성 ON/OFF 토글
    voiceToggle.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      if (voiceEnabled) {
        voiceToggle.classList.remove('off');
        voiceLabel.textContent = '음성 ON';
      } else {
        voiceToggle.classList.add('off');
        voiceLabel.textContent = '음성 OFF';
        speechSynthesis.cancel();
        stopAllRepeating();
      }
    });

    // ========== 메시지 확인 (Acknowledge) & 반복 알림 ==========

    // 메시지별 반복 타이머 저장: messageId -> intervalId
    const repeatTimers = new Map();
    const REPEAT_INTERVAL = 10000; // 10초

    // 체크박스 클릭 → 서버에 확인 요청 전송
    function acknowledgeMessage(messageId) {
      if (!socket || !messageId) return;
      if (myRole !== 'repair') return;
      socket.emit('acknowledge', messageId);
      // 즉시 로컬에서도 반복 중지 (서버 응답 기다리지 않음)
      stopRepeating(messageId);
    }

    // 메시지 삭제 → 서버에 삭제 요청 전송
    function deleteMessage(messageId) {
      if (!socket || !messageId) return;
      socket.emit('delete', messageId);
      // 서버 응답을 기다림 (서버에서 'deleted' 이벤트 받으면 UI 업데이트 + 음성 반복 중단)
    }

    // 특정 메시지에 대해 10초마다 음성 반복 시작
    function startRepeating(messageId, name, text) {
      if (!messageId) return;
      if (myRole !== 'repair') return;
      // 이미 등록되어 있으면 중복 등록 방지
      if (repeatTimers.has(messageId)) return;

      const timerId = setInterval(() => {
        // 반복 시에는 음성만 재생 (시각 알림은 startVisualAlert로 이미 지속 중)
        if (voiceEnabled) {
          speakMessage(name, text);
        }
      }, REPEAT_INTERVAL);

      repeatTimers.set(messageId, timerId);
    }

    // 특정 메시지의 음성 반복 중지
    function stopRepeating(messageId) {
      if (!messageId) return;
      const timerId = repeatTimers.get(messageId);
      if (timerId) {
        clearInterval(timerId);
        repeatTimers.delete(messageId);
      }
    }

    // 모든 반복 알림 중지
    function stopAllRepeating() {
      repeatTimers.forEach(id => clearInterval(id));
      repeatTimers.clear();
    }

  </script>
</body>
</html>
