      const handleQrFile = async (file) => {
        if (!file) return;
        if (!file.type.startsWith('image/')) { alert('사진만 전송할 수 있습니다.'); return; }
        if (file.size > 10 * 1024 * 1024) { alert('10MB 이하 사진만 전송할 수 있습니다.'); return; }

        statusEl.style.color = '#4B5563';
        statusEl.textContent = '⏳ 전송 중...';
        try {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('upload_preset', 'qaid_chat');
          const upRes = await fetch('https://api.cloudinary.com/v1_1/dmgrwqlyt/image/upload', {
            method: 'POST', body: formData
          });
          const upData = await upRes.json();
          if (!upData.secure_url) throw new Error('업로드 실패');

          socket.emit('message', {
            type: 'image',
            url: upData.secure_url,
            publicId: upData.public_id || null,
            resourceType: 'image',
            fileName: file.name || 'photo.jpg',
            fileType: file.type,
            fileSize: file.size
          });

          statusEl.style.color = '#10B981';
          statusEl.textContent = '✅ 전송 완료!';

          // 전송 목록에 카드 추가
          sentWrap.style.display = 'block';
          const card = document.createElement('div');
          card.style.cssText = 'display:flex;align-items:center;gap:12px;padding:10px;background:#fff;border:1px solid #E5E8EC;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.04);';
          const t = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
          card.innerHTML = `
            <img src="${upData.secure_url}" style="width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;font-weight:600;color:#1A1D24;">전송 완료</div>
              <div style="font-size:11px;color:#9098A4;margin-top:2px;">${t}</div>
            </div>
            <span style="color:#10B981;font-size:18px;">✓</span>`;
          sentList.prepend(card);

          setTimeout(() => { statusEl.textContent = ''; }, 2500);
        } catch (err) {
          console.error('[QR 업로드] 실패:', err);
          statusEl.style.color = '#EF4444';
          statusEl.textContent = '❌ 전송 실패. 다시 시도해주세요.';
        }
      };

      cameraInput.addEventListener('change', (e) => { handleQrFile(e.target.files[0]); cameraInput.value = ''; });
      albumInput.addEventListener('change', (e) => { handleQrFile(e.target.files[0]); albumInput.value = ''; });
    }
    // ==================== QR 모바일 모드 끝 ====================

    // 로그인 화면 핸들러
    // QR 모드(?qr=)일 때는 로그인 화면이 없으므로 핸들러 등록을 건너뜀
    const nameInput = document.getElementById('nameInput');
    const centerSelect = document.getElementById('centerSelect');
    const passwordInput = document.getElementById('passwordInput');
    const errorMessage = document.getElementById('errorMessage');
    const joinBtn = document.getElementById('joinBtn');
    const roleButtons = document.querySelectorAll('.role-btn');

    if (!qrTokenFromUrl && nameInput && centerSelect && passwordInput && joinBtn) {
    roleButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        roleButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedRole = btn.dataset.role;
        validateForm();
      });
    });

    nameInput.addEventListener('input', validateForm);
    centerSelect.addEventListener('change', validateForm);
    passwordInput.addEventListener('input', () => {
      validateForm();
      errorMessage.textContent = ''; // 입력 시작하면 에러 메시지 제거
    });

    joinBtn.addEventListener('click', joinChat);
    nameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !joinBtn.disabled) joinChat();
    });
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !joinBtn.disabled) joinChat();
    });
    } // end if (!qrTokenFromUrl) - QR 모드면 로그인 핸들러 건너뜀

    function validateForm() {
      joinBtn.disabled = !(
        nameInput.value.trim() &&
        selectedRole &&
        centerSelect.value &&
        passwordInput.value.trim()
      );
    }

    async function joinChat() {
      const inputName = nameInput.value.trim();
      const inputRole = selectedRole;
      const inputCenter = centerSelect.value;
      const inputPassword = passwordInput.value.trim();

      if (!inputName || !inputRole || !inputCenter || !inputPassword) return;

      // 버튼 비활성화 + 로딩 표시
      joinBtn.disabled = true;
      joinBtn.textContent = '인증 중...';
      errorMessage.textContent = '';
      errorMessage.classList.remove('success');

      try {
        // 서버에 비밀번호 검증 요청
        const res = await fetch('/api/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            center: inputCenter,
            password: inputPassword
          })
        });

        const data = await res.json();

        if (!data.success) {
          errorMessage.textContent = data.message || '인증 실패';
          joinBtn.disabled = false;
          joinBtn.textContent = '입장하기';

          // 차단된 경우 카운트다운 표시
          if (data.locked && data.secondsLeft) {
            startLockoutCountdown(data.secondsLeft);
          }
          return;
        }

        // 인증 성공 → 채팅방 입장
        myName = inputName;
        myRole = inputRole;
        myCenter = inputCenter;
        myPassword = inputPassword;

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('chatScreen').classList.add('active');

        // 음성 모드 토글: 고객대기실 사용자에게만 표시
        // 수리실은 음성을 보낼 필요가 없으므로 토글 숨김
        const voiceToggleEl = document.getElementById('voiceModeToggle');
        if (voiceToggleEl) {
          if (myRole === 'service') {
            voiceToggleEl.classList.add('show');
          } else {
            voiceToggleEl.classList.remove('show');
          }
        }

        // 센터명 표시
        document.getElementById('currentCenter').textContent = `📍 ${myCenter}`;
        document.getElementById('chatHeaderTitle').textContent = `${myCenter} 채팅방`;
        document.title = `Qaid · ${myCenter}`;

        // 음성 토글 버튼: 수리실만 표시
        const vt = document.getElementById('voiceToggle');
        if (vt) {
          vt.style.display = (myRole === 'repair') ? 'flex' : 'none';
        }

        connectSocket();
      } catch (err) {
        console.error('인증 요청 실패:', err);
        errorMessage.textContent = '서버 연결 실패. 잠시 후 다시 시도해주세요.';
        joinBtn.disabled = false;
        joinBtn.textContent = '입장하기';
      }
    }

    // 차단 시 카운트다운 표시
    let lockoutInterval = null;
    function startLockoutCountdown(seconds) {
      joinBtn.disabled = true;
      clearInterval(lockoutInterval);

      const updateMessage = () => {
        if (seconds <= 0) {
          clearInterval(lockoutInterval);
          errorMessage.textContent = '다시 시도하실 수 있습니다.';
          joinBtn.disabled = false;
          joinBtn.textContent = '입장하기';
          validateForm();
          return;
        }
        errorMessage.textContent = `차단됨. ${seconds}초 후 다시 시도해주세요.`;
        seconds--;
      };

      updateMessage();
      lockoutInterval = setInterval(updateMessage, 1000);
    }

    function connectSocket() {
      socket = io();

      socket.on('connect', () => {
        updateStatus(true);
        socket.emit('join', {
          name: myName,
          role: myRole,
          center: myCenter,
          password: myPassword
        });
      });

      socket.on('disconnect', () => updateStatus(false));

      socket.on('history', (history) => {
        history.forEach(msg => renderMessage(msg));
        scrollToBottom();
        // 수리실 입장 시: 아직 확인 안 된 "음성 알림이 포함된" 응대실 메시지가 있으면 음성 반복 시작
        // withVoice가 true인 메시지만 알림 대상
        if (myRole === 'repair') {
          const unackedVoiceMessages = history.filter(
            m => m.type === 'chat' && m.role === 'service' && !m.acknowledged && !m.deleted && m.id && m.withVoice === true
          );
          // 가장 최근 미확인 음성 메시지 1개에만 반복 알림 (스팸 방지)
          if (unackedVoiceMessages.length > 0) {
            const latest = unackedVoiceMessages[unackedVoiceMessages.length - 1];
            startRepeating(latest.id, latest.name, latest.text);
            // 미확인 음성 메시지가 있으면 시각 알림도 시작 (재접속 시에도 인지 가능)
            startVisualAlert();
          }
        }
      });

      socket.on('message', (msg) => {
        renderMessage(msg);
        scrollToBottom();

        // ===== 시스템 알림 (모든 메시지에 적용) =====
        // 본인 메시지가 아니고, 채팅 타입이고, 삭제되지 않은 메시지만
        if (
          msg.type === 'chat' &&
          !msg.deleted &&
          !(msg.name === myName && msg.role === myRole)
        ) {
          showSystemNotification(msg.name, msg.role);
        }

        // ===== 음성 모드 메시지: 기존 동작 (변경 없음) =====
        // 음성 재생 조건:
        // 1. 응대실(service)이 보낸 메시지
        // 2. 받는 사람이 수리실(repair)
        // 3. 보낸 사람이 음성 모드로 보냈음 (withVoice === true)
        // 4. 삭제되지 않은 메시지
        // 5. 본인 메시지가 아님
        if (
          msg.type === 'chat' &&
          !msg.deleted &&
          msg.role === 'service' &&
          myRole === 'repair' &&
          msg.withVoice === true &&        // 음성 모드로 보낸 메시지만!
          !(msg.name === myName && msg.role === myRole)
        ) {
          // 첫 알림: 비프음 + 시각 알림 시작 + 음성 재생
          playBeep();
          startVisualAlert(); // 확인 전까지 계속 깜빡임
          speakMessage(msg.name, msg.text);
          // 10초 반복 등록 (반복 시에는 비프음 없이 음성만, 시각 알림은 이미 진행 중)
          startRepeating(msg.id, msg.name, msg.text);
        }
      });

      // 서버에서 확인(acknowledge) 완료 알림 수신
      socket.on('acknowledged', ({ messageId, acknowledgedBy, acknowledgedAt }) => {
        // 1. 해당 메시지의 음성 반복 중단
        stopRepeating(messageId);

        // 1-1. 시각 알림 중단 (수리실에서만 활성화된 상태였음)
        if (myRole === 'repair') {
          stopVisualAlert();
        }

        // 2. UI 업데이트 - 체크박스 상태 변경
        const ackEl = document.querySelector(`.ack-container[data-ack-for="${messageId}"]`);
        if (ackEl) {
          ackEl.classList.add('acknowledged');
          const labelEl = ackEl.querySelector('.ack-label');
          if (labelEl) labelEl.textContent = '확인 완료';
          // 클릭 이벤트 제거 (이미 확인됨)
          ackEl.style.pointerEvents = 'none';
        }

        // 3. 확인 정보 표시/업데이트
        const ackTime = new Date(acknowledgedAt).toLocaleTimeString('ko-KR', {
          hour: '2-digit', minute: '2-digit'
        });
        const messageDiv = document.querySelector(`.message[data-message-id="${messageId}"]`);
        if (messageDiv) {
          let infoEl = messageDiv.querySelector('.ack-info');
          if (!infoEl) {
            infoEl = document.createElement('div');
            infoEl.className = 'ack-info';
            infoEl.dataset.ackInfoFor = messageId;
            messageDiv.appendChild(infoEl);
          }
          infoEl.textContent = `✓ ${acknowledgedBy}님이 ${ackTime}에 확인`;
        }
      });

      // 서버에서 메시지 삭제 알림 수신
      socket.on('deleted', ({ messageId, deletedAt }) => {
        // 1. 진행 중인 음성 반복 즉시 중단 (모든 사용자)
        stopRepeating(messageId);

        // 2. 수리실 사용자에게만 음성/시각 알림 중단 처리
        // 고객대기실에서는 어차피 음성이 재생되지 않으므로,
        // speechSynthesis.cancel()을 호출하면 불필요한 딜레이만 발생
        if (myRole === 'repair') {
          // 시각 알림 중단
          stopVisualAlert();

          // 현재 재생 중인 음성도 중단 (수리실에서만)
          if ('speechSynthesis' in window) {
            speechSynthesis.cancel();
          }
        }

        // 3. UI 업데이트 - 메시지를 삭제된 상태로 변경
        const messageDiv = document.querySelector(`.message[data-message-id="${messageId}"]`);
        if (messageDiv) {
          messageDiv.classList.add('deleted');
          const bubble = messageDiv.querySelector('.message-bubble');
          if (bubble) {
            // 이미지/파일 메시지인지 확인
            const hadImage = bubble.querySelector('.message-image');
            const hadFile = bubble.querySelector('.message-file');
            if (hadImage) bubble.textContent = '⊘ 삭제된 사진입니다.';
            else if (hadFile) bubble.textContent = '⊘ 삭제된 파일입니다.';
            else bubble.textContent = '⊘ 삭제된 메시지입니다.';
          }
          // 확인 체크박스/정보 제거
          const ackEl = messageDiv.querySelector('.ack-container');
          if (ackEl) ackEl.remove();
          const ackInfo = messageDiv.querySelector('.ack-info');
          if (ackInfo) ackInfo.remove();
          // 삭제 버튼 제거 (텍스트용 + 미디어용)
          const deleteBtn = messageDiv.querySelector('.delete-btn');
          if (deleteBtn) deleteBtn.remove();
          const mediaDeleteBtn = messageDiv.querySelector('.media-delete-btn');
          if (mediaDeleteBtn) mediaDeleteBtn.remove();
        }
      });

      socket.on('users', (users) => updateUserList(users));

      socket.on('typing', ({ name, role, isTyping }) => {
        const indicator = document.getElementById('typingIndicator');
        indicator.textContent = isTyping
          ? `${role === 'repair' ? '🔧' : '💬'} ${name}님이 입력 중...`
          : '';
      });
    }

    function updateStatus(connected) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (connected) {
        dot.classList.remove('disconnected');
        text.textContent = '연결됨';
      } else {
        dot.classList.add('disconnected');
        text.textContent = '연결 끊김';
      }
    }

    function updateUserList(users) {
      document.getElementById('userCount').textContent = users.length;
      const list = document.getElementById('userList');
      list.innerHTML = '';
      users.forEach(user => {
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `
          <span class="user-dot ${user.role}"></span>
          <span class="user-name">${escapeHtml(user.name)}</span>
          <span class="user-role">${user.role === 'repair' ? '수리실' : '고객대기실'}</span>
        `;
        list.appendChild(div);
      });
    }

    function renderMessage(msg) {
      const messagesEl = document.getElementById('messages');
      const div = document.createElement('div');
      const time = new Date(msg.timestamp).toLocaleTimeString('ko-KR', {
        hour: '2-digit',
        minute: '2-digit'
      });

      if (msg.type === 'system') {
        div.className = 'message system';
        div.innerHTML = `<div class="message-bubble">${escapeHtml(msg.text)}</div>`;
      } else if (msg.type === 'image' || msg.type === 'file') {
        // ===== 이미지/파일 메시지 =====
        const isOwn = msg.name === myName && msg.role === myRole;
        const isDeleted = msg.deleted === true;
        div.className = `message ${isOwn ? 'own' : 'other'}${isDeleted ? ' deleted' : ''}`;
        if (msg.id) div.dataset.messageId = msg.id;
        const roleIcon = msg.role === 'repair' ? '🔧' : '💬';
        const roleLabel = msg.role === 'repair' ? '수리실' : '고객대기실';
        const caption = msg.caption ? `<div class="message-image-caption">${escapeHtml(msg.caption)}</div>` : '';

        // 삭제된 경우
        if (isDeleted) {
          div.innerHTML = `
            <div class="message-meta">
              <span class="message-name ${msg.role}">${roleIcon} ${escapeHtml(msg.name)} · ${roleLabel}</span>
              <span>${time}</span>
            </div>
            <div class="message-bubble">⊘ 삭제된 ${msg.type === 'image' ? '사진' : '파일'}입니다.</div>
          `;
          messagesEl.appendChild(div);
          return;
        }

        let mediaHtml = '';
        if (msg.type === 'image') {
          const safeUrl = escapeHtml(msg.url);
          mediaHtml = `<img class="message-image" src="${safeUrl}" alt="전송된 사진" loading="lazy"
                 data-full-url="${safeUrl}" data-file-name="${escapeHtml(msg.fileName || 'image')}" />`;
        } else {
          // 문서 파일: 아이콘 + 파일명 + 크기
          const ext = (msg.fileName || '').split('.').pop().toLowerCase();
          let iconClass = 'file-icon-etc', iconText = ext.toUpperCase().slice(0, 4);
          if (['xls','xlsx','csv'].includes(ext)) { iconClass = 'file-icon-xls'; iconText = 'XLS'; }
          else if (['doc','docx'].includes(ext)) { iconClass = 'file-icon-doc'; iconText = 'DOC'; }
          else if (ext === 'pdf') { iconClass = 'file-icon-pdf'; iconText = 'PDF'; }
          else if (['hwp','hwpx'].includes(ext)) { iconClass = 'file-icon-hwp'; iconText = 'HWP'; }
          else if (['ppt','pptx'].includes(ext)) { iconClass = 'file-icon-ppt'; iconText = 'PPT'; }
          else if (['zip','rar','7z'].includes(ext)) { iconClass = 'file-icon-zip'; iconText = 'ZIP'; }
          const sizeStr = formatFileSize(msg.fileSize || 0);
          mediaHtml = `
            <a class="message-file" href="${escapeHtml(msg.url)}" target="_blank" rel="noopener" download="${escapeHtml(msg.fileName || 'file')}">
              <span class="message-file-icon ${iconClass}">${iconText}</span>
              <span class="message-file-info">
                <span class="message-file-name">${escapeHtml(msg.fileName || '파일')}</span>
                ${sizeStr ? `<span class="message-file-size">${sizeStr}</span>` : ''}
              </span>
            </a>`;
        }

        div.innerHTML = `
          <div class="message-meta">
            <span class="message-name ${msg.role}">${roleIcon} ${escapeHtml(msg.name)} · ${roleLabel}</span>
            <span>${time}</span>
          </div>
          <div class="message-bubble has-media">
            ${mediaHtml}
            ${caption}
          </div>
        `;

        // 이미지 클릭 → 크게 보기
        if (msg.type === 'image') {
          const imgEl = div.querySelector('.message-image');
          if (imgEl) imgEl.addEventListener('click', () => openLightbox(msg.url, msg.fileName));
        }

        // 삭제 버튼 표시 조건:
        // - 본인이 보낸 사진/파일, 또는
        // - QR로 올린 공용 사진(이름 'QR') → 같은 센터 누구나 삭제 가능
        const isQrPhoto = msg.type === 'image' && msg.name === 'QR';
        if ((isOwn || isQrPhoto) && msg.id) {
          const delBtn = document.createElement('button');
          delBtn.className = 'media-delete-btn';
          delBtn.textContent = '✕';
          delBtn.title = '삭제';
          delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            e.preventDefault();
            const what = msg.type === 'image' ? '사진을' : '파일을';
            const extra = isQrPhoto && !isOwn ? '\n(현장에서 QR로 올린 사진입니다)' : '';
            if (confirm('이 ' + what + ' 삭제할까요?\n(상대방 화면에서도 삭제됩니다)' + extra)) {
              socket.emit('delete', msg.id);
            }
          });
          // 사진을 감싼 말풍선에 붙임 (위치 기준점)
          const bubbleEl = div.querySelector('.message-bubble');
          if (bubbleEl) bubbleEl.appendChild(delBtn);
        }

        messagesEl.appendChild(div);
        return;
      } else {
        const isOwn = msg.name === myName && msg.role === myRole;
        const isDeleted = msg.deleted === true;
        div.className = `message ${isOwn ? 'own' : 'other'}${isDeleted ? ' deleted' : ''}`;
        if (msg.id) div.dataset.messageId = msg.id;
        const roleIcon = msg.role === 'repair' ? '🔧' : '💬';
        const roleLabel = msg.role === 'repair' ? '수리실' : '고객대기실';

        // 음성 모드로 보낸 메시지는 시각적으로 구분되도록 🔊 아이콘 표시
        const voiceBadge = (msg.withVoice === true && !isDeleted)
          ? '<span class="voice-badge" title="음성 알림으로 전송됨">🔊</span> '
          : '';

        let html = `
          <div class="message-meta">
            <span class="message-name ${msg.role}">${roleIcon} ${escapeHtml(msg.name)} · ${roleLabel}</span>
            <span>${time}</span>
          </div>
          <div class="message-bubble">${voiceBadge}${escapeHtml(msg.text)}</div>
        `;

        // 본인이 보낸 메시지 + 삭제 안 된 메시지면 → 삭제 버튼 추가
        if (isOwn && !isDeleted && msg.id) {
          html += `
            <button class="delete-btn" data-delete-for="${msg.id}" title="삭제">✕</button>
          `;
        }

        // 응대실 메시지인데 내가 수리실이면 → 확인 체크박스 표시
        // 단, 음성 모드(withVoice=true)로 보낸 메시지에만 표시 (반복 알림 중단용)
        // 텍스트 모드 메시지는 알림이 없으므로 체크박스 불필요
        if (!isDeleted && msg.role === 'service' && myRole === 'repair' && msg.withVoice === true) {
          const isAcked = msg.acknowledged === true;
          html += `
            <div class="ack-container ${isAcked ? 'acknowledged' : ''}" data-ack-for="${msg.id}">
              <div class="ack-checkbox"></div>
              <span class="ack-label">${isAcked ? '확인 완료' : '확인하기'}</span>
            </div>
          `;
          if (isAcked && msg.acknowledgedBy) {
            const ackTime = msg.acknowledgedAt
              ? new Date(msg.acknowledgedAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
              : '';
            html += `<div class="ack-info">${escapeHtml(msg.acknowledgedBy)}님이 ${ackTime}에 확인</div>`;
          }
        }
        // 응대실 본인이 보낸 음성 모드 메시지의 확인 정보 (응대실 측에서도 확인 여부 추적)
        else if (!isDeleted && msg.role === 'service' && myRole === 'service' && msg.withVoice === true && msg.acknowledged) {
          const ackTime = msg.acknowledgedAt
            ? new Date(msg.acknowledgedAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
            : '';
          html += `<div class="ack-info" data-ack-info-for="${msg.id}">✓ ${escapeHtml(msg.acknowledgedBy)}님이 ${ackTime}에 확인</div>`;
        }
        // 응대실 본인이 보낸 음성 모드 메시지가 아직 확인 안 됨
        else if (!isDeleted && msg.role === 'service' && myRole === 'service' && msg.withVoice === true && !msg.acknowledged) {
          html += `<div class="ack-info" data-ack-info-for="${msg.id}">⏳ 수리실 확인 대기 중</div>`;
        }

        div.innerHTML = html;

        // 체크박스 클릭 이벤트 (수리실만)
        const ackEl = div.querySelector('.ack-container');
        if (ackEl && !ackEl.classList.contains('acknowledged')) {
          ackEl.addEventListener('click', () => {
            acknowledgeMessage(msg.id);
          });
        }

        // 삭제 버튼 클릭 이벤트
        const deleteBtn = div.querySelector('.delete-btn');
        if (deleteBtn) {
          deleteBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            // window.confirm 대신 커스텀 모달 사용
            // (Windows Electron의 confirm() 포커스 버그 회피)
            const confirmed = await showConfirm({
              title: '메시지 삭제',
              message: '이 메시지를 삭제하시겠습니까?<br>삭제된 메시지는 모든 사용자에게 "⊘ 삭제된 메시지"로 표시됩니다.',
              confirmText: '삭제',
              cancelText: '취소'
            });
            if (confirmed) {
              deleteMessage(msg.id);
              // 삭제 후 입력창에 명시적으로 포커스 (Windows Electron 안전장치)
              const inputEl = document.getElementById('messageInput');
              if (inputEl) {
                setTimeout(() => inputEl.focus(), 100);
              }
            }
          });
        }
      }
      messagesEl.appendChild(div);
    }

    function scrollToBottom() {
      const messagesEl = document.getElementById('messages');
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 메시지 전송
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // ==================== 음성 모드 토글 ====================
    // 기본값: 텍스트 모드 (음성 안 보냄)
    // 음성 모드일 때만 수신측에서 음성 알림 재생
    // 한 번 전송하면 자동으로 텍스트 모드로 복귀 (실수 방지)
    let voiceMode = false;

    const voiceModeToggle = document.getElementById('voiceModeToggle');
    const voiceModeIcon = document.getElementById('voiceModeIcon');
    const voiceModeText = document.getElementById('voiceModeText');
    const inputWrapper = document.getElementById('inputWrapper');

    function setVoiceMode(enabled) {
      voiceMode = enabled;
      if (enabled) {
        voiceModeToggle.classList.add('active');
        voiceModeIcon.textContent = '🔊';
        voiceModeText.textContent = '음성 모드';
        inputWrapper.classList.add('voice-mode');
        messageInput.placeholder = '음성 알림과 함께 메시지를 보냅니다...';
      } else {
        voiceModeToggle.classList.remove('active');
        voiceModeIcon.textContent = '💬';
        voiceModeText.textContent = '텍스트 모드';
        inputWrapper.classList.remove('voice-mode');
        messageInput.placeholder = '메시지를 입력하세요... (Shift+Enter 줄바꿈)';
      }
    }

    // 토글 클릭 이벤트
    voiceModeToggle.addEventListener('click', () => {
      setVoiceMode(!voiceMode);
      // 클릭 직후 토글에서 포커스 제거 (모바일 :focus 배경 흰색 버그 회피)
      voiceModeToggle.blur();
      // 토글 후 입력창에 포커스 복귀
      setTimeout(() => messageInput.focus(), 0);
    });

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !socket) return;

      // 음성 모드 여부와 함께 전송
      socket.emit('message', {
        text: text,
        withVoice: voiceMode
      });

      messageInput.value = '';
      messageInput.style.height = 'auto';
      socket.emit('typing', false);

      // 음성 모드로 보냈으면 자동으로 텍스트 모드로 복귀 (실수 방지)
      if (voiceMode) {
        setVoiceMode(false);
      }
    }

    sendBtn.addEventListener('click', sendMessage);

    // ==================== 사진/파일 업로드 기능 ====================
    // Cloudinary 설정 (공개돼도 안전한 값)
    const CLOUDINARY_CLOUD_NAME = 'dmgrwqlyt';
    const CLOUDINARY_UPLOAD_PRESET = 'qaid_chat';
    const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB 제한

    const fileInput = document.getElementById('fileInput');
    const attachBtn = document.getElementById('attachBtn');
    const uploadProgress = document.getElementById('uploadProgress');
    const uploadProgressText = document.getElementById('uploadProgressText');
    const chatMain = document.querySelector('.main') || document.querySelector('main');

    // 첨부 버튼 → 파일 선택창 열기
    attachBtn.addEventListener('click', () => fileInput.click());

    // 파일 선택 시
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) uploadAndSend(file);
      fileInput.value = ''; // 같은 파일 다시 선택 가능하도록 초기화
    });

    // 이미지 파일 검증
    function validateFile(file) {
      if (file.size > MAX_FILE_SIZE) {
        alert('파일이 너무 큽니다. 10MB 이하의 파일만 전송할 수 있습니다.');
        return false;
      }
      return true;
    }

    // 파일 크기 보기 좋게 변환
    function formatFileSize(bytes) {
      if (!bytes || bytes <= 0) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // Cloudinary 업로드 후 채팅으로 전송 (이미지 + 문서 파일)
    async function uploadAndSend(file) {
      if (!validateFile(file)) return;
      if (!socket) { alert('연결이 끊어졌습니다. 새로고침 후 다시 시도해주세요.'); return; }

      const isImage = file.type.startsWith('image/');
      // 이미지는 image, 그 외 문서는 raw(원본 파일)로 업로드
      const resourceType = isImage ? 'image' : 'raw';

      uploadProgress.classList.add('show');
      uploadProgressText.textContent = (isImage ? '사진' : '파일') + ' 업로드 중...';

      try {
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

        const res = await fetch(
          `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${resourceType}/upload`,
          { method: 'POST', body: formData }
        );

        if (!res.ok) throw new Error('업로드 실패 (' + res.status + ')');
        const data = await res.json();
        if (!data.secure_url) throw new Error('파일 주소를 받지 못했습니다.');

        // 채팅으로 메시지 전송
        socket.emit('message', {
          type: isImage ? 'image' : 'file',
          url: data.secure_url,
          publicId: data.public_id || null,
          resourceType: resourceType,
          fileName: file.name || (isImage ? 'image' : 'file'),
          fileType: file.type || '',
          fileSize: file.size || 0
        });
      } catch (err) {
        console.error('[업로드] 실패:', err);
        alert('파일 전송에 실패했습니다.\n다시 시도해주세요.\n\n(' + err.message + ')');
      } finally {
        uploadProgress.classList.remove('show');
      }
    }

    // ===== 드래그 앤 드롭 =====
    if (chatMain) {
      chatMain.addEventListener('dragover', (e) => {
        e.preventDefault();
        chatMain.classList.add('drag-over');
      });
      chatMain.addEventListener('dragleave', (e) => {
        e.preventDefault();
        // 자식 요소로 이동 시 깜빡임 방지
        if (e.target === chatMain || !chatMain.contains(e.relatedTarget)) {
          chatMain.classList.remove('drag-over');
        }
      });
      chatMain.addEventListener('drop', (e) => {
        e.preventDefault();
        chatMain.classList.remove('drag-over');
        const file = e.dataTransfer.files && e.dataTransfer.files[0];
        if (file) uploadAndSend(file);
      });
    }

    // ===== 붙여넣기 (Ctrl+V로 캡처 이미지 전송) =====
    messageInput.addEventListener('paste', (e) => {
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (let i = 0; i < items.length; i++) {
        if (items[i].type.startsWith('image/')) {
          const file = items[i].getAsFile();
          if (file) {
            e.preventDefault();
            uploadAndSend(file);
          }
          break;
        }
      }
    });

    // ===== 이미지 크게 보기 (라이트박스) =====
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxDownload = document.getElementById('lightboxDownload');
    const lightboxClose = document.getElementById('lightboxClose');

    function openLightbox(url, fileName) {
      lightboxImg.src = url;
      lightboxDownload.href = url;
      lightboxDownload.setAttribute('download', fileName || 'image');
      lightbox.classList.add('show');
    }
    function closeLightbox() {
      lightbox.classList.remove('show');
      lightboxImg.src = '';
    }
    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('show')) closeLightbox();
    });
    // ==================== 사진 기능 끝 ====================

    // ==================== QR 코드 (폰으로 사진 올리기) ====================
    const openQrBtn = document.getElementById('openQrBtn');
    const qrModal = document.getElementById('qrModal');
    const qrModalClose = document.getElementById('qrModalClose');
    const qrCodeWrap = document.getElementById('qrCodeWrap');
    const qrModalTimer = document.getElementById('qrModalTimer');
    let qrTimerInterval = null;

    if (openQrBtn) {
      openQrBtn.addEventListener('click', openQrModal);
    }
    if (qrModalClose) {
      qrModalClose.addEventListener('click', closeQrModal);
    }
    if (qrModal) {
      qrModal.addEventListener('click', (e) => {
        if (e.target === qrModal) closeQrModal();
      });
    }

    async function openQrModal() {
      if (!myCenter || !myPassword) {
        alert('로그인 후 사용할 수 있습니다.');
        return;
      }

      qrModal.classList.add('show');
      qrCodeWrap.innerHTML = '<div class="qr-loading">QR 생성 중...</div>';
      qrModalTimer.textContent = '유효 시간: 5:00';
      qrModalTimer.classList.remove('expired');

      try {
        // 서버에서 QR 토큰 발급
        const res = await fetch('/api/qr/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ center: myCenter, password: myPassword })
        });
        const data = await res.json();
        if (!data.success || !data.token) throw new Error(data.message || 'QR 생성 실패');

        // 모바일 업로드 페이지 URL (현재 도메인 + ?qr=토큰)
        const uploadUrl = `${window.location.origin}/?qr=${data.token}`;

        // QR 코드 생성
        qrCodeWrap.innerHTML = '';
        new QRCode(qrCodeWrap, {
          text: uploadUrl,
          width: 180,
          height: 180,
          colorDark: '#1E5BAA',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M
        });

        // 5분 카운트다운
        startQrTimer(data.ttl || (5 * 60 * 1000));
      } catch (err) {
        console.error('[QR] 생성 실패:', err);
        qrCodeWrap.innerHTML = '<div class="qr-loading">QR 생성에 실패했습니다.<br>다시 시도해주세요.</div>';
      }
    }

    function startQrTimer(ttl) {
      if (qrTimerInterval) clearInterval(qrTimerInterval);
      let remaining = Math.floor(ttl / 1000);

      const update = () => {
        const min = Math.floor(remaining / 60);
        const sec = remaining % 60;
        if (remaining > 0) {
          qrModalTimer.textContent = `유효 시간: ${min}:${String(sec).padStart(2, '0')}`;
        } else {
          qrModalTimer.textContent = 'QR이 만료되었습니다. 닫고 다시 열어주세요.';
          qrModalTimer.classList.add('expired');
          clearInterval(qrTimerInterval);
        }
        remaining--;
      };
      update();
      qrTimerInterval = setInterval(update, 1000);
    }

    function closeQrModal() {
      qrModal.classList.remove('show');
      if (qrTimerInterval) clearInterval(qrTimerInterval);
    }
    // ==================== QR 코드 끝 ====================


    // 한글 IME(입력기) 조합 상태 추적
    // 한글 입력 중에는 Enter가 두 번 발생하는 문제를 방지
    let isComposing = false;

    messageInput.addEventListener('compositionstart', () => {
      isComposing = true;
    });

    messageInput.addEventListener('compositionend', () => {
      isComposing = false;
    });

    messageInput.addEventListener('keydown', (e) => {
      // 한글 조합 중이거나 IME 처리 중인 Enter는 무시
      if (e.isComposing || isComposing || e.keyCode === 229) return;

      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // 자동 높이 조절 + 타이핑 표시
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';

      if (socket) {
        socket.emit('typing', true);
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => socket.emit('typing', false), 1000);
      }
    });

    // ========== 음성 합성 (TTS) + 비프음 + 시각 알림 ==========
    let voiceEnabled = true;
    let koreanVoice = null;
    const voiceToggle = document.getElementById('voiceToggle');
    const voiceLabel = document.getElementById('voiceLabel');

    // 사용 가능한 음성 목록 로드
    function loadVoices() {
      if (!('speechSynthesis' in window)) return;
      const voices = speechSynthesis.getVoices();
      koreanVoice = voices.find(v => v.lang === 'ko-KR') ||
                    voices.find(v => v.lang.startsWith('ko')) ||
                    null;
    }

    if ('speechSynthesis' in window) {
      loadVoices();
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    // Web Audio API context (비프음용)
    let audioContext = null;
    function getAudioContext() {
      if (!audioContext) {
        try {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.warn('Web Audio API 사용 불가');
        }
      }
      if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
      }
      return audioContext;
    }

    // 비프음 ("딩-동" 짧은 알림음) - 고정 음량 (깨짐 방지)
    function playBeep() {
      const ctx = getAudioContext();
      if (!ctx) return;

      const now = ctx.currentTime;

      // 압축기 - 클리핑 방지 (음질 깨짐 방지)
      const compressor = ctx.createDynamicsCompressor();
      compressor.threshold.setValueAtTime(-12, now);
      compressor.knee.setValueAtTime(8, now);
      compressor.ratio.setValueAtTime(4, now);
      compressor.attack.setValueAtTime(0.003, now);
      compressor.release.setValueAtTime(0.25, now);

      // 게인 노드 - 고정 음량 (안전한 수준)
      const gainNode = ctx.createGain();
      const fixedGain = 0.4; // 적정 수준 (깨지지 않는 음량)
      gainNode.gain.setValueAtTime(0, now);
      gainNode.gain.linearRampToValueAtTime(fixedGain, now + 0.02);
      gainNode.gain.setValueAtTime(fixedGain, now + 0.15);
      gainNode.gain.linearRampToValueAtTime(0, now + 0.35);

      // 첫 번째 음 ("딩") - 880Hz
      const osc1 = ctx.createOscillator();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(880, now);
      osc1.connect(gainNode);
      osc1.start(now);
      osc1.stop(now + 0.15);

      // 두 번째 음 ("동") - 660Hz
      const osc2 = ctx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.setValueAtTime(660, now + 0.15);
      osc2.connect(gainNode);
      osc2.start(now + 0.15);
      osc2.stop(now + 0.35);

      gainNode.connect(compressor);
      compressor.connect(ctx.destination);
    }

    // ==================== 시스템 알림 (NEW) ====================
    // 카카오톡식 OS 알림 - 시각만, 소리 없음
    // 메시지 내용은 노출 안 하고 보낸 사람만 표시
    // 사용자가 토글로 끌 수 있음 (시스템 알림만, 음성/반복은 영향 X)

    let notificationPermissionRequested = false;
    let activeNotification = null; // 현재 떠있는 알림 (중복 방지용)

    // 알림 토글 상태 (localStorage에 저장)
    // 기본값: ON (true)
    let notificationsEnabled = localStorage.getItem('qaid_notifications_enabled') !== 'false';

    const notifToggleBtn = document.getElementById('notifToggleBtn');
    const notifIcon = document.getElementById('notifIcon');
    const notifLabel = document.getElementById('notifLabel');

    // 토글 UI 업데이트
    function updateNotifToggleUI() {
      if (notificationsEnabled) {
        notifToggleBtn.classList.remove('off');
        notifIcon.textContent = '🔔';
        notifLabel.textContent = '알림 ON';
        notifToggleBtn.title = '시스템 알림 끄기 (현재: 켜짐)';
      } else {
        notifToggleBtn.classList.add('off');
        notifIcon.textContent = '🔕';
        notifLabel.textContent = '알림 OFF';
        notifToggleBtn.title = '시스템 알림 켜기 (현재: 꺼짐)';
      }

      // 권한 거부됐으면 회색 처리 + 사용 안내
      if ('Notification' in window && Notification.permission === 'denied') {
        notifToggleBtn.classList.add('denied');
        notifToggleBtn.title = 'OS 설정에서 알림 권한이 거부되었습니다.\nOS 설정에서 권한을 허용해주세요.';
      } else {
        notifToggleBtn.classList.remove('denied');
      }
    }

    // 토글 클릭 핸들러
    notifToggleBtn.addEventListener('click', async () => {
      // 권한 거부 상태면 안내만
      if ('Notification' in window && Notification.permission === 'denied') {
        alert('알림 권한이 거부되어 있습니다.\n\nOS 설정에서 Qaid 앱의 알림을 허용해주세요.\n\n[Windows] 설정 → 시스템 → 알림 → Qaid Chat\n[Mac] 시스템 환경설정 → 알림 → Qaid');
        return;
      }

      // 권한 미요청 상태면 권한 요청 후 진행
      if ('Notification' in window && Notification.permission === 'default') {
        try {
          const result = await Notification.requestPermission();
          if (result !== 'granted') {
            updateNotifToggleUI();
            return;
          }
        } catch (e) {
          console.warn('[알림] 권한 요청 실패:', e);
        }
      }

      // 토글
      notificationsEnabled = !notificationsEnabled;
      localStorage.setItem('qaid_notifications_enabled', String(notificationsEnabled));
      updateNotifToggleUI();
    });

    // 페이지 로드 시 UI 초기화
    updateNotifToggleUI();

    // 알림 권한 자동 요청 (페이지 로드 후 2초)
    async function requestNotificationPermission() {
      if (notificationPermissionRequested) return;
      if (!('Notification' in window)) return;

      notificationPermissionRequested = true;

      if (Notification.permission === 'default') {
        try {
          await Notification.requestPermission();
          updateNotifToggleUI(); // 권한 결과 반영
        } catch (e) {
          console.warn('[알림] 권한 요청 실패:', e);
        }
      }
    }

    // 시스템 알림 표시 (조건 확인 후)
    function showSystemNotification(senderName, senderRole) {
      // ===== 표시하지 말아야 할 경우들 =====

      // 0. 사용자가 알림 OFF로 설정함 ⭐ NEW
      if (!notificationsEnabled) return;

      // 1. 본인이 보낸 메시지는 무시
      if (senderName === myName && senderRole === myRole) return;

      // 2. 채팅창이 포커스 상태이고 PIP 모드가 아니면 알림 안 띄움
      //    (사용자가 이미 채팅을 보고 있음)
      //    단, isInPipMode면 PIP 창이라 메인 채팅이 안 보이는 상태 → 알림 띄움
      const isMainWindowFocused = document.hasFocus() &&
                                   document.visibilityState === 'visible' &&
                                   !isInPipMode;
      if (isMainWindowFocused) return;

      // 3. 알림 권한 없으면 무시
      if (!('Notification' in window) || Notification.permission !== 'granted') return;

      // ===== 알림 텍스트 구성 =====
      const roleText = senderRole === 'repair' ? '수리실' : '고객대기실';
      const title = 'Qaid 채팅';
      const body = `${roleText} ${senderName}님이 메시지를 보냈습니다`;

      // ===== Electron 환경: 네이티브 알림 사용 (소리 없음) =====
      if (window.electronAPI && window.electronAPI.showNotification) {
        try {
          window.electronAPI.showNotification({ title, body, silent: true });
          return;
        } catch (e) {
          console.warn('[알림] Electron 알림 실패, 브라우저로 fallback:', e);
        }
      }

      // ===== 브라우저 환경: Notification API 사용 =====
      try {
        if (activeNotification) {
          try { activeNotification.close(); } catch (_) {}
        }

        activeNotification = new Notification(title, {
          body: body,
          silent: true,
          tag: 'qaid-message',
          requireInteraction: false
        });

        activeNotification.onclick = () => {
          window.focus();
          if (activeNotification) {
            activeNotification.close();
            activeNotification = null;
          }
        };

        activeNotification.onclose = () => {
          activeNotification = null;
        };
      } catch (e) {
        console.warn('[알림] 브라우저 알림 생성 실패:', e);
      }
    }

    // 페이지 로드 시 권한 미리 요청
    setTimeout(() => {
      requestNotificationPermission();
    }, 2000);

    // 음성 재생 (브라우저 기본 TTS)
    function speakMessage(name, text) {
      if (!voiceEnabled || !('speechSynthesis' in window)) return;

      const utterance = new SpeechSynthesisUtterance(`${name}님. ${text}`);
      utterance.lang = 'ko-KR';
      utterance.rate = 1.0;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;

      if (koreanVoice) {
        utterance.voice = koreanVoice;
      }

      speechSynthesis.speak(utterance);
    }

    // 시각 알림 - 메시지 영역 깜빡임 + 페이지 제목 변경
    // 핵심: 확인하기 클릭(또는 메시지 삭제) 전까지 계속 깜빡임
    let titleFlashInterval = null;
    let originalTitle = '';
    let activeAlertCount = 0; // 활성 알림 개수 추적

    function startVisualAlert() {
      activeAlertCount++;

      // 메시지 영역에 깜빡임 클래스 추가 (CSS animation infinite)
      const messagesEl = document.getElementById('messages');
      if (messagesEl) {
        messagesEl.classList.add('alert-flash');
      }

      // 페이지 제목 깜빡임 (이미 동작 중이면 중복 시작 방지)
      if (!titleFlashInterval) {
        if (!originalTitle) originalTitle = document.title;
        let flashState = false;
        titleFlashInterval = setInterval(() => {
          flashState = !flashState;
          document.title = flashState ? '🔔 새 메시지!' : originalTitle;
        }, 800);
      }
    }

    function stopVisualAlert() {
      if (activeAlertCount > 0) activeAlertCount--;

      // 활성 알림이 모두 사라지면 시각 알림 중단
      if (activeAlertCount === 0) {
        const messagesEl = document.getElementById('messages');
        if (messagesEl) {
          messagesEl.classList.remove('alert-flash');
        }

        if (titleFlashInterval) {
          clearInterval(titleFlashInterval);
          titleFlashInterval = null;
        }
        if (originalTitle) {
          document.title = originalTitle;
        }
      }
    }

    // 음성 ON/OFF 토글
    voiceToggle.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      if (voiceEnabled) {
        voiceToggle.classList.remove('off');
        voiceLabel.textContent = '음성 ON';
      } else {
        voiceToggle.classList.add('off');
        voiceLabel.textContent = '음성 OFF';
        speechSynthesis.cancel();
        stopAllRepeating();
      }
    });

    // ========== 메시지 확인 (Acknowledge) & 반복 알림 ==========

    // 메시지별 반복 타이머 저장: messageId -> intervalId
    const repeatTimers = new Map();
    const REPEAT_INTERVAL = 10000; // 10초

    // 체크박스 클릭 → 서버에 확인 요청 전송
    function acknowledgeMessage(messageId) {
      if (!socket || !messageId) return;
      if (myRole !== 'repair') return;
      socket.emit('acknowledge', messageId);
      // 즉시 로컬에서도 반복 중지 (서버 응답 기다리지 않음)
      stopRepeating(messageId);
    }

    // 메시지 삭제 → 서버에 삭제 요청 전송
    function deleteMessage(messageId) {
      if (!socket || !messageId) return;
      socket.emit('delete', messageId);
      // 서버 응답을 기다림 (서버에서 'deleted' 이벤트 받으면 UI 업데이트 + 음성 반복 중단)
    }

    // 특정 메시지에 대해 10초마다 음성 반복 시작
    function startRepeating(messageId, name, text) {
      if (!messageId) return;
      if (myRole !== 'repair') return;
      // 이미 등록되어 있으면 중복 등록 방지
      if (repeatTimers.has(messageId)) return;

      const timerId = setInterval(() => {
        // 반복 시에는 음성만 재생 (시각 알림은 startVisualAlert로 이미 지속 중)
        if (voiceEnabled) {
          speakMessage(name, text);
        }
      }, REPEAT_INTERVAL);

      repeatTimers.set(messageId, timerId);
    }

    // 특정 메시지의 음성 반복 중지
    function stopRepeating(messageId) {
      if (!messageId) return;
      const timerId = repeatTimers.get(messageId);
      if (timerId) {
        clearInterval(timerId);
        repeatTimers.delete(messageId);
      }
    }

    // 모든 반복 알림 중지
    function stopAllRepeating() {
      repeatTimers.forEach(id => clearInterval(id));
      repeatTimers.clear();
    }

  </script>
</body>
