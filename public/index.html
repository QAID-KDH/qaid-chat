<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qaid 채팅</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/variable/pretendardvariable-dynamic-subset.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* 큐에이드 브랜드 컬러 */
      --brand: #327CDB;
      --brand-hover: #2569C4;
      --brand-light: #E8F2FC;
      --brand-50: #F4F9FE;

      /* 라이트 모드 색상 */
      --bg: #FAFBFC;
      --surface: #FFFFFF;
      --surface-2: #F4F6F9;
      --border: #E5E8EC;
      --border-strong: #D5D9E0;
      --text: #1A1D24;
      --text-secondary: #4B5563;
      --text-dim: #9098A4;

      /* 부서 색상 */
      --repair: #E07B00;
      --repair-bg: #FFF6E6;
      --service: #1F9D55;
      --service-bg: #E8F5EE;
      --danger: #E11D48;
      --danger-bg: #FEF1F2;

      /* 그림자 */
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 12px 40px rgba(50, 124, 219, 0.12);
    }

    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
    }

    /* ============ 로그인 화면 ============ */
    .login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(50, 124, 219, 0.08), transparent 60%),
        radial-gradient(ellipse 80% 60% at 80% 100%, rgba(50, 124, 219, 0.06), transparent 60%),
        var(--bg);
      z-index: 100;
      padding: 20px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }

    .login-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .login-logo img {
      max-width: 180px;
      height: auto;
    }

    .login-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 32px;
      font-weight: 400;
    }

    .form-group { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    .form-input {
      width: 100%;
      padding: 13px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .form-input::placeholder {
      color: var(--text-dim);
      font-weight: 400;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(50, 124, 219, 0.12);
    }

    /* select 드롭다운 */
    select.form-input {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'%3e%3cpath fill='%239098A4' d='M6 8L0 0h12z'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 36px;
      cursor: pointer;
    }

    select.form-input option {
      background: var(--surface);
      color: var(--text);
    }

    .role-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .role-btn {
      padding: 14px 12px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .role-btn .icon { font-size: 22px; }

    .role-btn:hover {
      border-color: var(--brand);
      background: var(--brand-50);
    }

    .role-btn.active.repair {
      border-color: var(--repair);
      background: var(--repair-bg);
      color: var(--repair);
    }

    .role-btn.active.service {
      border-color: var(--service);
      background: var(--service-bg);
      color: var(--service);
    }

    .error-message {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      min-height: 18px;
      font-weight: 500;
    }

    .error-message.success { color: var(--service); }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: background 0.15s ease, transform 0.05s ease;
      letter-spacing: -0.01em;
    }

    .submit-btn:hover:not(:disabled) { background: var(--brand-hover); }
    .submit-btn:active:not(:disabled) { transform: translateY(1px); }
    .submit-btn:disabled {
      background: var(--border-strong);
      color: var(--text-dim);
      cursor: not-allowed;
    }

    /* ============ 채팅 화면 ============ */
    .chat-screen {
      display: none;
      height: 100vh;
      grid-template-columns: 260px 1fr;
      background: var(--bg);
    }

    .chat-screen.active { display: grid; }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }

    .sidebar-logo img {
      max-width: 110px;
      height: auto;
      display: block;
    }

    .sidebar-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-top: 6px;
    }

    .user-section {
      padding: 18px 20px;
      flex: 1;
      overflow-y: auto;
    }

    .user-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      font-size: 13px;
    }

    .user-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .user-dot.repair { background: var(--repair); }
    .user-dot.service { background: var(--service); }

    .user-name { font-weight: 600; color: var(--text); }
    .user-role { font-size: 11px; color: var(--text-dim); margin-left: auto; font-weight: 500; }

    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .chat-header {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .chat-header-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.015em;
    }

    .voice-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s ease;
    }

    .voice-toggle:hover {
      border-color: var(--brand);
      color: var(--brand);
    }

    .voice-toggle.off { opacity: 0.6; }
    .voice-toggle.off #voiceIcon::before { content: '🔇'; }

    /* ===== 알림 토글 버튼 (시스템 알림 ON/OFF) ===== */
    .notif-toggle-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      background: var(--brand-50, #F4F9FE);
      border: 1.5px solid var(--brand, #327CDB);
      border-radius: 8px;
      color: var(--brand-dark, #1E5BAA);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .notif-toggle-btn:hover {
      background: var(--brand-light, #E8F2FC);
    }

    .notif-toggle-btn.off {
      background: var(--surface-2);
      border-color: var(--border);
      color: var(--text-dim, #9098A4);
    }

    .notif-toggle-btn.off:hover {
      background: var(--surface-2);
      border-color: var(--text-dim, #9098A4);
    }

    /* 권한 거부된 경우 (사용 불가) */
    .notif-toggle-btn.denied {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--service);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.disconnected {
      background: var(--danger);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg);
    }

    .messages::-webkit-scrollbar { width: 8px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 4px;
    }
    .messages::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 70%;
      animation: slideIn 0.2s ease-out;
      position: relative;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.own { align-self: flex-end; align-items: flex-end; }
    .message.other { align-self: flex-start; }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 5px;
      padding: 0 4px;
      font-weight: 500;
    }

    .message-name { font-weight: 700; }
    .message-name.repair { color: var(--repair); }
    .message-name.service { color: var(--service); }

    .message-bubble {
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-weight: 500;
      position: relative;
    }

    /* 메시지 호버 시 삭제 버튼 표시 */
    .message.own {
      position: relative;
      /* 좌측에 X 버튼 영역 padding 추가 - hover 영역 확장 */
      padding-left: 36px;
    }

    .delete-btn {
      position: absolute;
      /* 메시지 박스에 살짝 걸치게 배치 - hover가 끊기지 않음 */
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      box-shadow: var(--shadow-md);
      transition: opacity 0.15s ease, transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      padding: 0;
      z-index: 5;
      line-height: 1;
    }

    .delete-btn:hover {
      background: var(--danger);
      border-color: var(--danger);
      color: white;
      transform: translateY(-50%) scale(1.1);
    }

    /* 본인 메시지 영역 전체에 호버하면 삭제 버튼 표시 */
    /* padding-left로 확장된 영역까지 모두 hover 가능 */
    .message.own:hover .delete-btn {
      opacity: 1;
      pointer-events: auto;
    }

    /* 모바일에서는 항상 보이게 (호버 없으므로) */
    @media (hover: none) {
      .message.own .delete-btn {
        opacity: 0.7;
        pointer-events: auto;
      }
      .message.own .delete-btn:active {
        opacity: 1;
      }
    }

    /* 삭제된 메시지 스타일 */
    .message.deleted .message-bubble {
      background: var(--surface-2) !important;
      color: var(--text-dim) !important;
      font-style: italic;
      font-weight: 400;
      border: 1px dashed var(--border-strong) !important;
      box-shadow: none !important;
    }

    .message.deleted {
      padding-left: 0 !important;
    }

    .message.deleted .delete-btn {
      display: none !important;
    }

    /* 삭제된 메시지는 호버 시에도 X 버튼 표시 안 함 */
    .message.deleted:hover .delete-btn {
      display: none !important;
    }

    .message.deleted .ack-container {
      display: none !important;
    }

    .message.own .message-bubble {
      background: var(--brand);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.other .message-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow-sm);
    }

    .message.system {
      align-self: center;
      max-width: 100%;
    }

    .message.system .message-bubble {
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-weight: 500;
      box-shadow: none;
    }

    /* 확인 체크박스 (수리실에서만 표시) */
    .ack-container {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      padding: 7px 12px;
      background: var(--repair-bg);
      border: 1px solid var(--repair);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 12px;
      font-weight: 600;
      user-select: none;
      animation: pulseAlert 1.5s ease-in-out infinite;
    }

    .ack-container:hover {
      background: #FFE7BF;
      transform: translateY(-1px);
    }

    @keyframes pulseAlert {
      0%, 100% { box-shadow: 0 0 0 0 rgba(224, 123, 0, 0.35); }
      50% { box-shadow: 0 0 0 6px rgba(224, 123, 0, 0); }
    }

    .ack-checkbox {
      width: 16px;
      height: 16px;
      border: 2px solid var(--repair);
      border-radius: 4px;
      flex-shrink: 0;
      position: relative;
      transition: all 0.15s ease;
      background: white;
    }

    .ack-label {
      color: var(--repair);
      font-weight: 700;
    }

    .ack-container.acknowledged {
      background: var(--service-bg);
      border-color: var(--service);
      cursor: default;
      animation: none;
    }

    .ack-container.acknowledged .ack-checkbox {
      background: var(--service);
      border-color: var(--service);
    }

    .ack-container.acknowledged .ack-checkbox::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 0px;
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .ack-container.acknowledged .ack-label {
      color: var(--service);
    }

    .ack-info {
      margin-top: 4px;
      padding: 0 4px;
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .typing-indicator {
      padding: 8px 24px;
      font-size: 12px;
      color: var(--text-dim);
      font-style: italic;
      min-height: 28px;
      background: var(--bg);
    }

    .input-area {
      padding: 16px 24px 22px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    /* ==================== 사진/파일 기능 ==================== */
    /* 첨부 버튼 (📎) */
    .attach-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border: none;
      background: transparent;
      color: var(--text-secondary, #5A6373);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .attach-btn:hover {
      background: var(--brand-light, #E8F2FC);
      color: var(--brand, #327CDB);
    }
    .attach-btn svg { width: 22px; height: 22px; }

    /* 업로드 진행 표시 */
    .upload-progress {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      margin-bottom: 10px;
      background: var(--brand-light, #E8F2FC);
      border-radius: 10px;
      font-size: 13px;
      color: var(--brand-dark, #1E5BAA);
    }
    .upload-progress.show { display: flex; }
    .upload-spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--brand, #327CDB);
      border-top-color: transparent;
      border-radius: 50%;
      animation: uploadSpin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes uploadSpin { to { transform: rotate(360deg); } }
    .upload-progress .cancel-upload {
      margin-left: auto;
      background: none; border: none;
      color: var(--text-secondary, #5A6373);
      cursor: pointer; font-size: 16px;
    }

    /* 채팅 내 이미지 썸네일 */
    .message-image {
      display: block;
      max-width: 240px;
      max-height: 240px;
      border-radius: 12px;
      cursor: pointer;
      object-fit: cover;
      background: var(--surface-2, #F4F6F9);
      transition: opacity 0.15s;
    }
    .message-image:hover { opacity: 0.9; }
    .message-image-caption {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }
    .message.deleted .message-image { display: none; }

    /* 문서 파일 메시지 (엑셀/워드/PDF 등) */
    .message-file {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface-2, #F4F6F9);
      border: 1px solid var(--border, #E5E8EC);
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      min-width: 200px;
      max-width: 280px;
      transition: background 0.15s;
    }
    .message-file:hover { background: var(--brand-light, #E8F2FC); }
    .message-file-icon {
      flex-shrink: 0;
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }
    .file-icon-xls { background: #1D6F42; }
    .file-icon-doc { background: #2B579A; }
    .file-icon-pdf { background: #D93831; }
    .file-icon-hwp { background: #0FA8E0; }
    .file-icon-ppt { background: #C13B1B; }
    .file-icon-zip { background: #8E7B4C; }
    .file-icon-etc { background: #6B7280; }
    .message-file-info { flex: 1; min-width: 0; }
    .message-file-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .message-file-size {
      font-size: 11px;
      color: var(--text-secondary, #5A6373);
      margin-top: 2px;
    }
    .message.deleted .message-file { display: none; }

    /* 이미지/파일 메시지의 삭제 버튼 */
    /* 이미지/파일을 담은 말풍선을 기준점으로 */
    .message-bubble.has-media {
      position: relative;
    }
    .message .media-delete-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #fff;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 0;
      line-height: 1;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    .message-bubble.has-media:hover .media-delete-btn { display: flex; }
    .message .media-delete-btn:hover { background: rgba(217,56,49,0.95); }

    /* 드래그 오버 표시 */
    .main.drag-over::after {
      content: '📎 여기에 놓으면 사진이 전송됩니다';
      position: absolute;
      inset: 0;
      background: rgba(50, 124, 219, 0.12);
      border: 3px dashed var(--brand, #327CDB);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--brand-dark, #1E5BAA);
      z-index: 50;
      pointer-events: none;
    }

    /* 이미지 크게 보기 (라이트박스) */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 8px;
      object-fit: contain;
    }
    .lightbox-actions { display: flex; gap: 12px; }
    .lightbox-btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .lightbox-btn:hover { background: rgba(255,255,255,0.28); }
    .lightbox-btn.primary { background: var(--brand, #327CDB); }
    .lightbox-btn.primary:hover { background: var(--brand-dark, #1E5BAA); }

    /* QR 코드 팝업 */
    .qr-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .qr-modal.show { display: flex; }
    .qr-modal-box {
      background: #fff;
      border-radius: 20px;
      padding: 28px 32px 24px;
      width: 360px;
      max-width: 90vw;
      text-align: center;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .qr-modal-close {
      position: absolute;
      top: 16px; right: 16px;
      width: 32px; height: 32px;
      border: none; background: var(--surface-2, #F4F6F9);
      border-radius: 50%;
      cursor: pointer; font-size: 16px;
      color: var(--text-secondary, #5A6373);
    }
    .qr-modal-close:hover { background: var(--border, #E5E8EC); }
    .qr-modal-title {
      font-size: 19px; font-weight: 700;
      color: var(--text, #2D3748);
      margin-bottom: 6px;
    }
    .qr-modal-desc {
      font-size: 13px;
      color: var(--text-secondary, #5A6373);
      margin-bottom: 20px;
    }
    .qr-code-wrap {
      width: 200px; height: 200px;
      margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      background: #fff;
      border: 1px solid var(--border, #E5E8EC);
      border-radius: 12px;
      padding: 10px;
    }
    .qr-code-wrap img, .qr-code-wrap canvas { display: block; }
    .qr-loading { font-size: 13px; color: var(--text-dim, #9098A4); }
    .qr-modal-steps {
      text-align: left;
      background: var(--brand-50, #F4F9FE);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .qr-step {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px;
      color: var(--text, #2D3748);
      padding: 4px 0;
    }
    .qr-step span {
      flex-shrink: 0;
      width: 22px; height: 22px;
      background: var(--brand, #327CDB);
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }
    .qr-modal-timer {
      font-size: 13px;
      color: var(--text-secondary, #5A6373);
      font-weight: 600;
    }
    .qr-modal-timer.expired { color: var(--danger, #EF4444); }


    /* ==================== 음성 모드 토글 ==================== */
    .voice-mode-toggle {
      /* 기본은 숨김 - 고객대기실 사용자에게만 .show 클래스로 표시 */
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      margin-bottom: 10px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      cursor: pointer;
      transition: all 0.18s ease;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-secondary);
      user-select: none;
      -webkit-user-select: none;
      font-family: inherit;
      /* 모바일에서 텍스트 잘림 방지 */
      white-space: nowrap;
      flex-shrink: 0;
      width: auto;
      max-width: 100%;
      box-sizing: border-box;
      line-height: 1.2;
      /* 모바일 브라우저의 기본 버튼 스타일 제거 */
      -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    /* 포커스 상태에서도 기본 스타일 유지 (모바일 브라우저의 흰색 배경 버그 회피) */
    .voice-mode-toggle:focus,
    .voice-mode-toggle:focus-visible {
      outline: none;
      background: var(--surface-2);
    }

    /* 고객대기실 사용자에게만 토글 표시 */
    .voice-mode-toggle.show {
      display: inline-flex;
    }

    .voice-mode-toggle:hover {
      background: var(--brand-50);
      border-color: var(--brand);
      color: var(--brand-dark);
    }

    /* 음성 모드일 때 토글 버튼 스타일 */
    /* :focus와 함께 적용 - 모바일에서 클릭 직후 포커스가 잡혀도 파란색 유지 */
    .voice-mode-toggle.active,
    .voice-mode-toggle.active:focus,
    .voice-mode-toggle.active:focus-visible {
      background: var(--brand) !important;
      background-color: #327CDB !important;
      border-color: var(--brand) !important;
      color: white !important;
      box-shadow: 0 2px 8px rgba(50, 124, 219, 0.25);
      outline: none;
    }

    /* active 상태일 때 자식 요소들도 명시적으로 흰색 (모바일 호환) */
    .voice-mode-toggle.active .voice-mode-toggle-icon,
    .voice-mode-toggle.active .voice-mode-toggle-text {
      color: white !important;
    }

    .voice-mode-toggle.active:hover {
      background: var(--brand-dark) !important;
      background-color: #2569C4 !important;
      border-color: var(--brand-dark) !important;
    }

    .voice-mode-toggle-icon {
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }

    .voice-mode-toggle-text {
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .message-input {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      resize: none;
      line-height: 1.4;
      transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .message-input::placeholder {
      color: var(--text-dim);
      font-weight: 400;
    }

    .message-input:focus {
      outline: none;
      border-color: var(--brand);
      background: var(--surface);
    }

    /* 음성 모드일 때 입력창 테두리 파란색 강조 */
    .input-wrapper.voice-mode .message-input {
      border-color: var(--brand);
      background: var(--brand-50);
      box-shadow: 0 0 0 3px rgba(50, 124, 219, 0.12);
    }

    .input-wrapper.voice-mode .message-input::placeholder {
      color: var(--brand);
      font-weight: 500;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--brand);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s ease, transform 0.05s ease;
      box-shadow: 0 2px 8px rgba(50, 124, 219, 0.3);
    }

    .send-btn:hover:not(:disabled) { background: var(--brand-hover); }
    .send-btn:active:not(:disabled) { transform: scale(0.95); }
    .send-btn:disabled {
      background: var(--border-strong);
      box-shadow: none;
      cursor: not-allowed;
    }

    /* 시각 알림 효과 - 메시지 영역 깜빡임 (확인하기 클릭 전까지 지속) */
    .messages.alert-flash {
      animation: alertFlash 1.2s ease-in-out infinite;
    }

    @keyframes alertFlash {
      0%, 100% {
        background: var(--bg);
        box-shadow: inset 0 0 0 0 rgba(225, 29, 72, 0);
      }
      50% {
        background: var(--danger-bg);
        box-shadow: inset 0 0 0 4px var(--danger);
      }
    }

    @media (max-width: 768px) {
      .chat-screen.active { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .message { max-width: 85%; }
    }
    /* ==================== 커스텀 확인 모달 ==================== */
    /* window.confirm() 대신 사용 - Windows Electron의 포커스 버그 회피 */
    .confirm-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .confirm-modal-backdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    .confirm-modal {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 24px 20px;
      width: 92%;
      max-width: 340px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      transform: scale(0.92);
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .confirm-modal-backdrop.active .confirm-modal {
      transform: scale(1);
    }

    .confirm-modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      text-align: center;
    }

    .confirm-modal-message {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      text-align: center;
      margin-bottom: 22px;
    }

    .confirm-modal-buttons {
      display: flex;
      gap: 8px;
    }

    .confirm-modal-btn {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .confirm-modal-btn-cancel {
      background: var(--surface-2);
      color: var(--text-secondary);
    }

    .confirm-modal-btn-cancel:hover {
      background: var(--border);
      color: var(--text);
    }

    .confirm-modal-btn-confirm {
      background: var(--danger);
      color: white;
    }

    .confirm-modal-btn-confirm:hover {
      background: #c41036;
    }

    /* 음성 알림 배지 - 음성 모드로 보낸 메시지 시각 구분 */
    .voice-badge {
      display: inline-block;
      font-size: 0.92em;
      margin-right: 2px;
      vertical-align: baseline;
      opacity: 0.85;
    }

    /* 음성 모드로 보낸 본인 메시지는 살짝 강조 */
    .message.own .message-bubble:has(.voice-badge) {
      box-shadow: 0 0 0 2px rgba(50, 124, 219, 0.18);
    }

    /* ==================== 작업 패널 (수리메모 + 에스컬레이션) ==================== */
    /* 헤더의 메모 버튼 */
    .memo-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      cursor: pointer;
      transition: all 0.18s ease;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-secondary);
      user-select: none;
      -webkit-user-select: none;
      -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1.2;
    }

    .memo-btn:hover {
      background: var(--brand-50);
      border-color: var(--brand);
      color: var(--brand-dark);
    }

    .memo-btn:focus,
    .memo-btn:focus-visible {
      outline: none;
      background: var(--surface-2);
    }

    /* 활성화 시 (사이드바 열려있을 때) */
    .memo-btn.active,
    .memo-btn.active:focus,
    .memo-btn.active:focus-visible {
      background: var(--brand) !important;
      background-color: #327CDB !important;
      border-color: var(--brand) !important;
      color: white !important;
      box-shadow: 0 2px 8px rgba(50, 124, 219, 0.25);
    }

    .memo-btn.active:hover {
      background: var(--brand-dark) !important;
      border-color: var(--brand-dark) !important;
    }

    /* 작업 패널 백드롭 (모바일에서만) */
    .memo-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .memo-backdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* 우측 슬라이드 사이드바 */
    .memo-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 420px;
      max-width: 92vw;
      height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 20px rgba(0, 0, 0, 0.06);
      z-index: 999;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .memo-panel.active {
      transform: translateX(0);
    }

    /* 패널 헤더 */
    .memo-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }

    .memo-panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .memo-panel-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 18px;
      transition: background 0.15s ease;
      -webkit-appearance: none;
      outline: none;
    }

    .memo-panel-close:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    /* 탭 영역 */
    .memo-tabs {
      display: flex;
      gap: 6px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .memo-tab {
      flex: 1;
      padding: 9px 12px;
      background: var(--surface-2);
      border: 1.5px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all 0.15s ease;
      font-family: inherit;
      -webkit-appearance: none;
      outline: none;
      white-space: nowrap;
    }

    .memo-tab:hover {
      background: var(--brand-50);
      color: var(--brand-dark);
    }

    .memo-tab.active {
      background: var(--brand);
      color: white;
      border-color: var(--brand);
    }

    /* 패널 본문 */
    .memo-panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 섹션 라벨 */
    .memo-section-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .memo-section-label::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--brand);
      border-radius: 2px;
    }

    /* 제품군 선택 영역 */
    .memo-product-select {
      display: flex;
      gap: 8px;
    }

    .memo-product-option {
      flex: 1;
      padding: 12px 8px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-align: center;
      transition: all 0.15s ease;
      font-family: inherit;
      -webkit-appearance: none;
      outline: none;
    }

    .memo-product-option:hover {
      background: var(--brand-50);
      border-color: var(--brand);
      color: var(--brand-dark);
    }

    .memo-product-option.selected {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }

    /* 메모 텍스트 영역 */
    .memo-textarea {
      width: 100%;
      min-height: 320px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Pretendard Variable', 'Apple SD Gothic Neo', 'Malgun Gothic', monospace;
      color: var(--text);
      line-height: 1.7;
      resize: vertical;
      transition: border-color 0.15s ease;
      box-sizing: border-box;
    }

    .memo-textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(50, 124, 219, 0.1);
    }

    .memo-textarea::placeholder {
      color: var(--text-dim);
    }

    /* 안내 메시지 (제품군 미선택 시) */
    .memo-empty-hint {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.6;
      background: var(--surface-2);
      border-radius: 10px;
      border: 1.5px dashed var(--border);
    }

    .memo-empty-hint-icon {
      font-size: 28px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    /* 패널 푸터 (버튼 영역) */
    .memo-panel-footer {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--surface);
    }

    /* 메모 참고하기 드롭박스 */
    .memo-preset-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .memo-preset-select {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface-2);
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235A6373' stroke-width='2'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 16px;
      padding-right: 32px;
    }
    .memo-preset-select:focus { border-color: var(--brand); }
    .memo-preset-delete {
      flex-shrink: 0;
      width: 38px;
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .memo-preset-delete:hover:not(:disabled) {
      background: #FEE2E2;
      color: #EF4444;
      border-color: #FECACA;
    }
    .memo-preset-delete:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* 메모 이름 입력 모달 */
    .memo-name-modal {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;

  <script>
    let socket = null;
    let myName = '';
    let myRole = '';
    let myCenter = '';
    let myPassword = '';
    let selectedRole = '';
    let typingTimer = null;

    // ==================== 커스텀 확인 모달 ====================
    // Windows Electron에서 window.confirm()이 IME/포커스 충돌을 일으키는 버그가 있어
    // 직접 만든 모달로 대체. Promise 기반으로 confirm()과 똑같이 사용 가능.
    function showConfirm(options = {}) {
      return new Promise((resolve) => {
        const backdrop = document.getElementById('confirmModalBackdrop');
        const titleEl = document.getElementById('confirmModalTitle');
        const messageEl = document.getElementById('confirmModalMessage');
        const cancelBtn = document.getElementById('confirmModalCancelBtn');
        const confirmBtn = document.getElementById('confirmModalConfirmBtn');

        // 옵션 적용
        if (options.title) titleEl.textContent = options.title;
        if (options.message) messageEl.innerHTML = options.message;
        if (options.cancelText) cancelBtn.textContent = options.cancelText;
        if (options.confirmText) confirmBtn.textContent = options.confirmText;

        // 모달 표시
        backdrop.classList.add('active');

        // 이벤트 핸들러 (한 번만 실행되도록 once 옵션)
        const cleanup = () => {
          backdrop.classList.remove('active');
          cancelBtn.removeEventListener('click', onCancel);
          confirmBtn.removeEventListener('click', onConfirm);
          backdrop.removeEventListener('click', onBackdropClick);
          document.removeEventListener('keydown', onKeyDown);
        };

        const onCancel = () => {
          cleanup();
          resolve(false);
        };

        const onConfirm = () => {
          cleanup();
          resolve(true);
        };

        const onBackdropClick = (e) => {
          // 배경 클릭 시 취소
          if (e.target === backdrop) onCancel();
        };

        const onKeyDown = (e) => {
          if (e.key === 'Escape') onCancel();
          else if (e.key === 'Enter') onConfirm();
        };

        cancelBtn.addEventListener('click', onCancel);
        confirmBtn.addEventListener('click', onConfirm);
        backdrop.addEventListener('click', onBackdropClick);
        document.addEventListener('keydown', onKeyDown);

        // 확인 버튼에 포커스 (엔터로 빠른 확정 가능)
        setTimeout(() => confirmBtn.focus(), 50);
      });
    }

    // ==================== 작업 패널 (수리메모 + 에스컬레이션) ====================
    // 우측 슬라이드 사이드바로 작성 → 클립보드 복사 기능
    // localStorage에 저장하여 브라우저 닫아도 내용 유지

    // 제품군별 템플릿
    const REPAIR_TEMPLATES = {
      iOS: `- 고객 보고 증상 : 
- 문제해결 및 진단 내역
  1. 
- 외관 상태
  · 디스플레이 : 
  · 인클로저 : 
  · 후면유리 : 
- 서비스 제안 내용
  · 수리에 적용되는 보증 : 
  · 확인된 증상 : 
  · 수리에 필요한 부품 : 
  · 금액 : 
  · 수리 유형 : 
  · 예상 수리 완료 시간 : `
    };

    // 에스컬레이션 템플릿
    const ESCALATION_TEMPLATE = `GSX Sold-to ( 구매 계정 ) : 
GSX Ship-to ( 배송 계정 ) : 
수리 진행한 테크니션 이름 : 
테크니션 이메일 주소 : 
제품 일련 번호 : 
제품 모델 : 
모든 KBB 초기 접수 증상 ( 기능적 및 / 또는 물리적 문제 ) : 
무단 개조 또는 의도적인 손상 유무 : 
참고한 문서 : 
수리 번호 : 
고객에게 영향이 있는 긴급 요청 건 : 
에스컬레이션 사유 : `;

    // localStorage 키
    const STORAGE_KEYS = {
      repairText: 'qaid_memo_repair_text',
      escalationText: 'qaid_memo_escalation_text',
      activeTab: 'qaid_memo_active_tab',
      presets: 'qaid_memo_presets',  // 저장된 메모 프리셋 (이름→내용)
      textareaHeight: 'qaid_memo_textarea_height',  // 수리메모 작성창 높이 (px)
      escalationHeight: 'qaid_memo_escalation_height'  // 에스컬레이션 작성창 높이 (px)
    };

    // 현재 탭 상태
    let currentMemoTab = 'repair'; // 'repair' 또는 'escalation'
    let currentProduct = 'iOS'; // 제품군 선택 제거 → iPhone(iOS) 템플릿으로 고정
    // 현재 불러온 메모 (수정 후 재저장 시 모달에 미리 채우기 위함)
    let loadedMemo = { category: '', name: '' };

    // DOM 참조
    const memoPanel = document.getElementById('memoPanel');
    const memoBackdrop = document.getElementById('memoBackdrop');
    const openMemoBtn = document.getElementById('openMemoBtn');
    const openEscalationBtn = document.getElementById('openEscalationBtn');
    const memoPanelCloseBtn = document.getElementById('memoPanelCloseBtn');
    const memoTabs = document.querySelectorAll('.memo-tab');
    const repairTabContent = document.getElementById('repairTabContent');
    const escalationTabContent = document.getElementById('escalationTabContent');
    const repairMemoText = document.getElementById('repairMemoText');
    const escalationText = document.getElementById('escalationText');
    const memoCopyBtn = document.getElementById('memoCopyBtn');
    const memoClearBtn = document.getElementById('memoClearBtn');
    const memoSaveBtn = document.getElementById('memoSaveBtn');
    const memoPresetSelect = document.getElementById('memoPresetSelect');
    const memoPresetDelete = document.getElementById('memoPresetDelete');
    const memoCategorySelect = document.getElementById('memoCategorySelect');
    const memoPanelIcon = document.getElementById('memoPanelIcon');
    const memoPanelTitle = document.getElementById('memoPanelTitle');

    // 패널 열기/닫기
    function openMemoPanel(tab) {
      memoPanel.classList.add('active');
      memoBackdrop.classList.add('active');
      switchMemoTab(tab);
      // 패널을 열 때마다 저장소에서 메모 목록을 다시 읽어옴 (현재 선택은 유지)
      // → 앱에서 옆에 띄운 창에서 저장한 메모가 메인 창을 다시 열 때 반영되도록
      restoreMemoDropdowns(memoCategorySelect.value, memoPresetSelect.value);
      // 헤더 버튼 active 상태 갱신
      updateMemoButtonState();
    }

    function closeMemoPanel() {
      memoPanel.classList.remove('active');
      memoBackdrop.classList.remove('active');
      openMemoBtn.classList.remove('active');
      openEscalationBtn.classList.remove('active');
    }

    // 헤더 버튼 활성 상태 갱신
    function updateMemoButtonState() {
      const isOpen = memoPanel.classList.contains('active');
      openMemoBtn.classList.toggle('active', isOpen && currentMemoTab === 'repair');
      openEscalationBtn.classList.toggle('active', isOpen && currentMemoTab === 'escalation');
    }

    // 탭 전환
    function switchMemoTab(tab) {
      currentMemoTab = tab;
      localStorage.setItem(STORAGE_KEYS.activeTab, tab);

      // 탭 버튼 활성화
      memoTabs.forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });

      // 콘텐츠 전환
      if (tab === 'repair') {
        repairTabContent.style.display = '';
        escalationTabContent.style.display = 'none';
        memoPanelIcon.textContent = '🔧';
        memoPanelTitle.textContent = '수리메모';
      } else {
        repairTabContent.style.display = 'none';
        escalationTabContent.style.display = '';
        memoPanelIcon.textContent = '⚠️';
        memoPanelTitle.textContent = '에스컬레이션';
      }
      updateMemoButtonState();
    }

    // 텍스트 영역 변경 시 저장
    repairMemoText.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEYS.repairText, repairMemoText.value);
    });

    escalationText.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEYS.escalationText, escalationText.value);
    });

    // ===== 자동 번호 매기기 (Enter 시 다음 번호 자동 삽입) =====
    // 현재 줄이 "  숫자. " 형식이면 Enter 시 다음 번호 자동 추가
    // 빈 번호 줄("  3. " + 내용 없음)에서 Enter → 번호 매기기 종료
    // 다른 섹션(외관 상태, 서비스 제안 등)에는 영향 없음
    repairMemoText.addEventListener('keydown', (e) => {
      // 한글 IME 조합 중에는 무시 (한글 입력 중 엔터 충돌 방지)
      if (e.isComposing || e.keyCode === 229) return;

      if (e.key !== 'Enter') return;
      if (e.shiftKey) return; // Shift+Enter는 일반 줄바꿈

      const textarea = e.target;
      const cursorPos = textarea.selectionStart;
      const text = textarea.value;

      // 커서 위치 기준 현재 줄의 시작 위치 찾기
      const lineStart = text.lastIndexOf('\n', cursorPos - 1) + 1;
      const lineEnd = text.indexOf('\n', cursorPos);
      const currentLine = text.slice(lineStart, lineEnd === -1 ? text.length : lineEnd);

      // 현재 줄이 "  숫자. " 패턴인지 확인 (들여쓰기 2칸 + 숫자 + 마침표 + 공백)
      const numberPattern = /^(  )(\d+)\.\s(.*)$/;
      const match = currentLine.match(numberPattern);

      if (!match) return; // 번호 줄이 아니면 일반 동작

      const indent = match[1];
      const currentNumber = parseInt(match[2], 10);
      const lineContent = match[3];

      // 빈 번호 줄에서 Enter → 번호 매기기 종료
      if (lineContent.trim() === '') {
        e.preventDefault();
        // 현재 빈 번호 줄을 제거하고 일반 빈 줄로 대체
        const newText = text.slice(0, lineStart) + '\n' + text.slice(lineEnd === -1 ? text.length : lineEnd + 1);
        // 만약 마지막 줄이었다면 정리
        const beforeLine = text.slice(0, lineStart);
        const afterLine = lineEnd === -1 ? '' : text.slice(lineEnd);
        textarea.value = beforeLine + afterLine.replace(/^\n/, '');
        // 커서 위치
        textarea.selectionStart = textarea.selectionEnd = lineStart;
        // input 이벤트 수동 발생 (localStorage 저장 트리거)
        textarea.dispatchEvent(new Event('input', { bubbles: true }));
        return;
      }

      // 다음 번호 자동 삽입
      e.preventDefault();
      const nextNumber = currentNumber + 1;
      const insertion = '\n' + indent + nextNumber + '. ';

      const newText = text.slice(0, cursorPos) + insertion + text.slice(cursorPos);
      textarea.value = newText;

      // 커서를 새 번호 뒤로 이동
      const newCursorPos = cursorPos + insertion.length;
      textarea.selectionStart = textarea.selectionEnd = newCursorPos;

      // input 이벤트 수동 발생 (localStorage 저장 트리거)
      textarea.dispatchEvent(new Event('input', { bubbles: true }));
    });

    // ==================== 메모 참고하기 (프리셋, 제품군별 2단) ====================
    // 구조: { 제품군: { 메모이름: 내용 } }  (localStorage, PC별)

    // 웹 PIP에서는 memoPanel이 별도 창(document)으로 이동하므로,
    // 패널이 실제로 속한 document에서 요소를 찾아야 함 (메인 document 고정 X)
    function memoDoc() {
      return (memoPanel && memoPanel.ownerDocument) || document;
    }
    function mEl(id) {
      return memoDoc().getElementById(id);
    }

    function loadPresets() {
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.presets);
        const data = raw ? JSON.parse(raw) : {};
        // 구버전({이름:내용}) → 신버전 마이그레이션: '기타' 제품군으로 이동
        const looksOld = Object.values(data).some(v => typeof v === 'string');
        if (looksOld) {
          const migrated = { '기타': {} };
          Object.keys(data).forEach(k => {
            if (typeof data[k] === 'string') migrated['기타'][k] = data[k];
            else migrated[k] = data[k];
          });
          return migrated;
        }
        return data;
      } catch (e) {
        return {};
      }
    }

    function savePresets(presets) {
      try {
        localStorage.setItem(STORAGE_KEYS.presets, JSON.stringify(presets));
      } catch (e) {
        console.error('프리셋 저장 실패:', e);
      }
    }

    // 1단계: 제품군 드롭박스 갱신
    function refreshCategoryDropdown() {
      const presets = loadPresets();
      const categories = Object.keys(presets)
        .filter(c => Object.keys(presets[c]).length > 0)
        .sort((a, b) => a.localeCompare(b, 'ko'));  // 가나다순 정렬

      memoCategorySelect.innerHTML = '<option value="">제품군 선택</option>';
      categories.forEach(cat => {
        const opt = memoDoc().createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        memoCategorySelect.appendChild(opt);
      });
      memoCategorySelect.value = '';

      // 저장 모달의 제품군 자동완성 목록도 갱신 (가나다순)
      const datalist = mEl('memoCategoryList');
      if (datalist) {
        datalist.innerHTML = '';
        Object.keys(presets).sort((a, b) => a.localeCompare(b, 'ko')).forEach(cat => {
          const opt = memoDoc().createElement('option');
          opt.value = cat;
          datalist.appendChild(opt);
        });
      }

      // 2단계 드롭박스 초기화
      memoPresetSelect.innerHTML = '<option value="">메모 선택</option>';
      memoPresetSelect.disabled = true;
      memoPresetDelete.disabled = true;
    }

    // 2단계: 선택한 제품군의 메모 드롭박스 갱신
    function refreshPresetDropdown() {
      const category = memoCategorySelect.value;
      memoPresetSelect.innerHTML = '<option value="">메모 선택</option>';
      memoPresetDelete.disabled = true;

      if (!category) {
        memoPresetSelect.disabled = true;
        return;
      }

      const presets = loadPresets();
      const memos = presets[category] || {};
      // 메모 이름 가나다순 정렬
      Object.keys(memos).sort((a, b) => a.localeCompare(b, 'ko')).forEach(name => {
        const opt = memoDoc().createElement('option');
        opt.value = name;
        opt.textContent = name;
        memoPresetSelect.appendChild(opt);
      });
      memoPresetSelect.disabled = false;
      memoPresetSelect.value = '';
    }

    // 현재 메모를 저장 (모달 열기)
    function saveCurrentMemo() {
      const text = repairMemoText.value;
      if (!text.trim()) {
        showCopyFeedback('내용을 입력해주세요', false);
        return;
      }
      openNameModal();
    }

    function openNameModal() {
      const modal = mEl('memoNameModal');
      const catInput = mEl('memoCategoryInput');
      const nameInput = mEl('memoNameInput');

      // 불러온 메모가 있으면 제품군+이름 미리 채움 (수정/덮어쓰기 편의)
      if (loadedMemo.category && loadedMemo.name) {
        catInput.value = loadedMemo.category;
        nameInput.value = loadedMemo.name;
      } else {
        // 새 메모: 제품군은 드롭박스 선택값이 있으면 채우고, 이름은 비움
        catInput.value = memoCategorySelect.value || '';
        nameInput.value = '';
      }

      modal.classList.add('show');
      setTimeout(() => { try { catInput.focus(); } catch(e){} }, 50);
    }

    function closeNameModal() {
      mEl('memoNameModal').classList.remove('show');
    }

    // 모달에서 저장 확정 (제품군 + 메모 이름)
    async function confirmSaveMemo() {
      const catInput = mEl('memoCategoryInput');
      const nameInput = mEl('memoNameInput');
      const category = catInput.value.trim();
      const name = nameInput.value.trim();

      if (!category) { try { catInput.focus(); } catch(e){} return; }
      if (!name) { try { nameInput.focus(); } catch(e){} return; }

      const text = repairMemoText.value;
      const presets = loadPresets();
      if (!presets[category]) presets[category] = {};

      // 신규인지 덮어쓰기인지 판단
      const isOverwrite = !!presets[category][name];

      // 같은 제품군에 같은 이름이 있으면 덮어쓰기 확인
      if (isOverwrite) {
        mEl('memoNameModal').classList.remove('show');
        const ok = await showMemoConfirm(
          '덮어쓰기',
          `"${category}"에 "${name}" 메모가 이미 있습니다.<br>덮어쓸까요?`,
          '덮어쓰기'
        );
        if (!ok) {
          mEl('memoNameModal').classList.add('show');
          return;
        }
      }

      presets[category][name] = text;
      savePresets(presets);
      refreshCategoryDropdown();
      // 방금 저장한 제품군/메모 자동 선택
      memoCategorySelect.value = category;
      refreshPresetDropdown();
      memoPresetSelect.value = name;
      memoPresetDelete.disabled = false;
      // 방금 저장한 메모를 "불러온 메모"로 기록 (이어서 또 저장 시 편의)
      loadedMemo = { category: category, name: name };
      closeNameModal();

      // 저장 결과 알림 모달 (신규/덮어쓰기 구분)
      if (isOverwrite) {
        await showMemoAlert(
          '수정 완료',
          `"${category}" 제품군의<br>"${name}" 메모가 덮어쓰기되었습니다.`
        );
      } else {
        await showMemoAlert(
          '저장 완료',
          `"${category}" 제품군에<br>"${name}" 메모가 새로 저장되었습니다.`
        );
      }
    }

    // 제품군 선택 시 → 메모 드롭박스 갱신
    function onCategoryChange() {
      refreshPresetDropdown();
      // 제품군을 "제품군 선택"(빈 값)으로 되돌리면 기본 iPhone 템플릿으로 복귀
      if (!memoCategorySelect.value) {
        repairMemoText.value = REPAIR_TEMPLATES.iOS;
        repairMemoText.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }

    // 메모 선택 → 작성창에 불러오기
    function loadSelectedPreset() {
      const category = memoCategorySelect.value;
      const name = memoPresetSelect.value;

      // 메모를 "메모 선택"(빈 값)으로 되돌리면 기본 iPhone 템플릿으로 복귀
      if (!name) {
        memoPresetDelete.disabled = true;
        loadedMemo = { category: '', name: '' };  // 불러온 메모 기록 초기화
        repairMemoText.value = REPAIR_TEMPLATES.iOS;
        repairMemoText.dispatchEvent(new Event('input', { bubbles: true }));
        return;
      }
      if (!category) {
        memoPresetDelete.disabled = true;
        return;
      }
      memoPresetDelete.disabled = false;

      const presets = loadPresets();
      const content = (presets[category] || {})[name];
      if (content === undefined) return;

      // 불러온 메모 기록 (재저장 시 모달에 미리 채우기 위함)
      loadedMemo = { category: category, name: name };
      repairMemoText.value = content;
      repairMemoText.dispatchEvent(new Event('input', { bubbles: true }));
    }

    // 선택한 메모 삭제
    async function deleteSelectedPreset() {
      const category = memoCategorySelect.value;
      const name = memoPresetSelect.value;
      if (!category || !name) return;

      const ok = await showMemoConfirm(
        '메모 삭제',
        `"${category}"의 "${name}" 메모를 삭제할까요?`,
        '삭제'
      );
      if (!ok) return;

      const presets = loadPresets();
      if (presets[category]) {
        delete presets[category][name];
        // 제품군에 메모가 하나도 없으면 제품군도 제거
        if (Object.keys(presets[category]).length === 0) delete presets[category];
      }
      savePresets(presets);
      refreshCategoryDropdown();
      showCopyFeedback('삭제되었습니다', true);
    }

    // 패널 안 확인 모달 (덮어쓰기/삭제용 - PIP/Electron 호환)
    // showConfirm과 달리 패널 내부에 있어 PIP 창으로 이동해도 함께 작동
    function showMemoConfirm(title, message, confirmText) {
      return new Promise((resolve) => {
        const modal = mEl('memoConfirmModal');
        const titleEl = mEl('memoConfirmTitle');
        const msgEl = mEl('memoConfirmMessage');
        const okBtn = mEl('memoConfirmOk');
        const cancelBtn = mEl('memoConfirmCancel');

        titleEl.textContent = title || '확인';
        msgEl.innerHTML = message || '';
        okBtn.textContent = confirmText || '확인';
        cancelBtn.style.display = '';  // 취소 버튼 항상 표시 (알림 모달이 숨겼을 수 있어 복원)
        modal.classList.add('show');

        const cleanup = () => {
          modal.classList.remove('show');
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
        };
        const onOk = () => { cleanup(); resolve(true); };
        const onCancel = () => { cleanup(); resolve(false); };
        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
      });
    }

    // 알림 모달 (확인 버튼만 - 저장 완료 등 결과 안내용)
    function showMemoAlert(title, message) {
      return new Promise((resolve) => {
        const modal = mEl('memoConfirmModal');
        const titleEl = mEl('memoConfirmTitle');
        const msgEl = mEl('memoConfirmMessage');
        const okBtn = mEl('memoConfirmOk');
        const cancelBtn = mEl('memoConfirmCancel');

        titleEl.textContent = title || '알림';
        msgEl.innerHTML = message || '';
        okBtn.textContent = '확인';
        cancelBtn.style.display = 'none';  // 취소 버튼 숨김 (알림이라 확인만)
        modal.classList.add('show');

        const cleanup = () => {
          modal.classList.remove('show');
          cancelBtn.style.display = '';  // 다음 사용을 위해 복원
          okBtn.removeEventListener('click', onOk);
        };
        const onOk = () => { cleanup(); resolve(true); };
        okBtn.addEventListener('click', onOk);
      });
    }

    // 이벤트 연결
    memoSaveBtn.addEventListener('click', saveCurrentMemo);
    memoCategorySelect.addEventListener('change', onCategoryChange);
    memoPresetSelect.addEventListener('change', loadSelectedPreset);
    memoPresetDelete.addEventListener('click', deleteSelectedPreset);

    // 이름 입력 모달 버튼
    document.getElementById('memoNameConfirm').addEventListener('click', confirmSaveMemo);
    document.getElementById('memoNameCancel').addEventListener('click', closeNameModal);
    // 제품군 입력칸 Enter → 메모 이름칸으로 이동
    document.getElementById('memoCategoryInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); mEl('memoNameInput').focus(); }
      if (e.key === 'Escape') closeNameModal();
    });
    document.getElementById('memoNameInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); confirmSaveMemo(); }
      if (e.key === 'Escape') closeNameModal();
    });

    // 초기 드롭박스 채우기 (제품군 목록)
    refreshCategoryDropdown();

    // 다른 창(앱의 '옆에 띄운' 창 포함)에서 메모 프리셋이 바뀌면
    // 이 창의 드롭박스도 자동으로 다시 읽어옴 (현재 선택은 유지)
    // ※ storage 이벤트는 "변경을 일으킨 창"이 아니라 "그 외 다른 창"에서 발생함 → 메인 창이 받음
    window.addEventListener('storage', (e) => {
      if (e.key === STORAGE_KEYS.presets) {
        restoreMemoDropdowns(memoCategorySelect.value, memoPresetSelect.value);
      }
    });

    // ===== 메모 작성창 높이 저장/복원 (수리메모 + 에스컬레이션 각각) =====
    // 사용자가 ⊿ 핸들로 조절한 높이를 기억했다가 다음에 복원
    function setupTextareaHeight(textarea, storageKey) {
      if (!textarea) return;
      // 복원
      const saved = parseInt(localStorage.getItem(storageKey), 10);
      if (saved && saved >= 100) {
        textarea.style.height = saved + 'px';
      }
      // 높이 변화 감지 → 저장 (디바운스)
      if (window.ResizeObserver) {
        let saveTimer = null;
        const ro = new ResizeObserver(() => {
          if (saveTimer) clearTimeout(saveTimer);
          saveTimer = setTimeout(() => {
            const h = textarea.offsetHeight;
            if (h >= 100) localStorage.setItem(storageKey, h);
          }, 300);
        });
        ro.observe(textarea);
      }
    }
    setupTextareaHeight(repairMemoText, STORAGE_KEYS.textareaHeight);
    setupTextareaHeight(escalationText, STORAGE_KEYS.escalationHeight);
    // ==================== 메모 참고하기 끝 ====================

    // 복사하기 - 현재 활성 탭의 내용을 클립보드에 복사
    async function copyMemoText() {
      let textToCopy = '';
      if (currentMemoTab === 'repair') {
        textToCopy = repairMemoText.value;
        if (!textToCopy.trim()) {
          showCopyFeedback('내용이 비어있습니다', false);
          return;
        }
      } else {
        textToCopy = escalationText.value;
        if (!textToCopy.trim()) {
          showCopyFeedback('내용이 비어있습니다', false);
          return;
        }
      }

      // 클립보드 복사 시도 (최신 API → fallback)
      try {
        await navigator.clipboard.writeText(textToCopy);
        showCopyFeedback('복사되었습니다!', true);
      } catch (err) {
        // fallback: textarea로 복사
        const target = currentMemoTab === 'repair' ? repairMemoText : escalationText;
        target.select();
        target.setSelectionRange(0, 99999);
        try {
          document.execCommand('copy');
          showCopyFeedback('복사되었습니다!', true);
        } catch (e) {
          showCopyFeedback('복사 실패. 수동 복사해주세요', false);
        }
      }
    }

    // 복사 버튼 피드백
    function showCopyFeedback(message, isSuccess) {
      const originalText = '📋 복사하기';
      const originalClass = memoCopyBtn.className;

      if (isSuccess) {
        memoCopyBtn.innerHTML = '✓ ' + message;
        memoCopyBtn.classList.add('copied');
      } else {
        memoCopyBtn.innerHTML = '⚠️ ' + message;
      }

      setTimeout(() => {
        memoCopyBtn.innerHTML = originalText;
        memoCopyBtn.className = originalClass;
      }, 1800);
    }

    // 지우기 (현재 활성 탭의 내용만 삭제)
    async function clearMemoText() {
      const tabName = currentMemoTab === 'repair' ? '수리메모' : '에스컬레이션';
      const confirmed = await showConfirm({
        title: '작성 내용 삭제',
        message: `${tabName} 작성 내용을 모두 지우시겠습니까?<br>이 작업은 되돌릴 수 없습니다.`,
        confirmText: '지우기',
        cancelText: '취소'
      });
      if (!confirmed) return;

      if (currentMemoTab === 'repair') {
        // 작성창을 비우고 기본 iPhone 템플릿 다시 입력
        repairMemoText.value = REPAIR_TEMPLATES.iOS;
        localStorage.setItem(STORAGE_KEYS.repairText, repairMemoText.value);
        setTimeout(() => repairMemoText.focus(), 100);
      } else {
        escalationText.value = '';
        localStorage.removeItem(STORAGE_KEYS.escalationText);
      }
    }

    // localStorage에서 복원
    function restoreMemoState() {
      // 에스컬레이션 이전 템플릿 마이그레이션 (빈 옛 템플릿이면 새 템플릿으로 교체)
      const oldEscalationMarkers = ['문제 범주:', '주제:', '- VMI(마이크로 검사)', '- 송장번호:'];
      const savedEsc = localStorage.getItem(STORAGE_KEYS.escalationText);
      if (savedEsc) {
        const hasOldMarkers = oldEscalationMarkers.some(m => savedEsc.includes(m));
        const isEmptyTemplate = savedEsc.split('\n').every(line => {
          const idx = line.indexOf(':');
          if (idx === -1) return true;
          return line.slice(idx + 1).trim() === '';
        });
        if (hasOldMarkers && isEmptyTemplate) {
          localStorage.setItem(STORAGE_KEYS.escalationText, ESCALATION_TEMPLATE);
        }
      }

      // 수리메모 복원: 저장된 내용이 있으면 복원, 없으면 iPhone(iOS) 템플릿 기본 입력
      const savedRepairText = localStorage.getItem(STORAGE_KEYS.repairText);
      repairMemoText.value = (savedRepairText !== null && savedRepairText.trim() !== '')
        ? savedRepairText
        : REPAIR_TEMPLATES.iOS;

      // 에스컬레이션 복원 (텍스트가 없으면 템플릿으로 초기화)
      const savedEscalation = localStorage.getItem(STORAGE_KEYS.escalationText);
      escalationText.value = savedEscalation !== null ? savedEscalation : ESCALATION_TEMPLATE;
    }

    // ==================== 옆에 띄우기 (PIP) ====================
    // 2가지 방식 지원:
    // 1. Electron 환경: window.electronAPI 사용 (별도 BrowserWindow) - 안정적
    // 2. 브라우저 환경: Document Picture-in-Picture API - Chrome/Edge 116+
    // Electron이 우선, 없으면 브라우저 PIP API 사용

    let pipWindow = null;          // 브라우저 PIP 창 참조 (Electron에서는 사용 안 함)
    const PIP_DEFAULT_WIDTH = 320;
    const PIP_DEFAULT_HEIGHT = 500;

    const memoPopoutBtn = document.getElementById('memoPopoutBtn');

    // Electron 환경 감지 (preload.js에서 노출한 API 확인)
    const isElectronApp = !!(window.electronAPI && window.electronAPI.isElectron);

    // 브라우저 PIP API 지원 여부 (Electron이 없을 때만 fallback)
    const isBrowserPipSupported = 'documentPictureInPicture' in window;

    // 둘 중 하나라도 지원하면 옆에 띄우기 가능
    const isPipAvailable = isElectronApp || isBrowserPipSupported;

    if (isPipAvailable) {
      document.body.classList.add('pip-supported');
    }

    // 현재 페이지가 PIP 창인지 확인 (Electron 자체 창의 경우)
    const urlParams = new URLSearchParams(window.location.search);
    const isInPipMode = urlParams.get('pipMode') === '1';
    const pipInitialTab = urlParams.get('tab') || 'repair';

    // ===== Electron 자체 창에서 실행 중인 경우 =====
    // 메인 창과 별도의 BrowserWindow로 열려있음
    // → 채팅 UI 숨기고 메모 패널만 전체 화면으로 표시
    if (isInPipMode && isElectronApp) {
      document.body.classList.add('pip-mode');
      // 로딩 후 자동으로 사이드바 열기
      window.addEventListener('load', () => {
        // 약간의 지연 (DOM 준비 시간)
        setTimeout(() => {
          openMemoPanel(pipInitialTab);
        }, 300);
      });

      // 메인 창에서 탭 변경 요청 받기
      if (window.electronAPI.onPipSetTab) {
        window.electronAPI.onPipSetTab((tab) => {
          switchMemoTab(tab);
        });
      }
    }

    // 옆에 띄우기 버튼 클릭 → 분기 처리
    async function openInPipWindow() {
      // ===== Electron 환경: 자체 BrowserWindow 사용 =====
      if (isElectronApp) {
        try {
          const result = await window.electronAPI.openPipWindow(currentMemoTab);
          if (result.success) {
            // 메인 창의 사이드바 닫기
            closeMemoPanel();
          } else {
            alert('미니창을 띄우지 못했습니다.\n\n' + (result.error || '잠시 후 다시 시도해주세요.'));
          }
        } catch (err) {
          console.error('Electron PIP 창 생성 실패:', err);
          alert('미니창을 띄우지 못했습니다.\n\n' + (err.message || '알 수 없음'));
        }
        return;
      }

      // ===== 브라우저 환경: Document PIP API 사용 (fallback) =====
      if (!isBrowserPipSupported) {
        alert('이 기능은 Chrome/Edge 116+ 또는 Qaid 앱에서 사용 가능합니다.');
        return;
      }

      // 이미 열려있다면 포커스만
      if (pipWindow && !pipWindow.closed) {
        pipWindow.focus();
        return;
      }

      try {
        const savedWidth = parseInt(localStorage.getItem('qaid_pip_width'), 10) || PIP_DEFAULT_WIDTH;
        const savedHeight = parseInt(localStorage.getItem('qaid_pip_height'), 10) || PIP_DEFAULT_HEIGHT;

        pipWindow = await documentPictureInPicture.requestWindow({
          width: savedWidth,
          height: savedHeight
        });

        // 메인 페이지의 CSS를 PIP 창에도 복사
        [...document.styleSheets].forEach(sheet => {
          try {
            const cssRules = [...sheet.cssRules].map(rule => rule.cssText).join('');
            const style = pipWindow.document.createElement('style');
            style.textContent = cssRules;
            pipWindow.document.head.appendChild(style);
          } catch (e) {
            const link = pipWindow.document.createElement('link');
            link.rel = 'stylesheet';
            link.href = sheet.href;
            pipWindow.document.head.appendChild(link);
          }
        });

        // 패널을 PIP 창으로 옮기기 전에 현재 선택 상태 기억
        const prevCat = memoCategorySelect.value;
        const prevMemo = memoPresetSelect.value;

        pipWindow.document.body.classList.add('pip-mode');
        pipWindow.document.body.appendChild(memoPanel);

        // 패널이 PIP 창(다른 document)으로 이동했으므로 드롭박스를 그 document 기준으로 다시 생성
        restoreMemoDropdowns(prevCat, prevMemo);

        memoBackdrop.classList.remove('active');
        openMemoBtn.classList.remove('active');
        openEscalationBtn.classList.remove('active');
        memoPanel.classList.add('active');

        pipWindow.addEventListener('resize', () => {
          localStorage.setItem('qaid_pip_width', pipWindow.innerWidth);
          localStorage.setItem('qaid_pip_height', pipWindow.innerHeight);
        });

        pipWindow.addEventListener('pagehide', () => {
          returnFromPip();
        });

        pipWindow.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            pipWindow.close();
          }
        });

      } catch (err) {
        console.error('PIP 창 생성 실패:', err);
        let userMessage = '미니창을 띄우지 못했습니다.\n\n';
        if (err.name === 'NotAllowedError') {
          userMessage += '브라우저에서 PIP 권한이 거부되었습니다.';
        } else if (err.name === 'InvalidStateError') {
          userMessage += '현재 상태에서 미니창을 띄울 수 없습니다.\n잠시 후 다시 시도해주세요.';
        } else {
          userMessage += err.message || '알 수 없는 오류';
        }
        alert(userMessage);
        pipWindow = null;
      }
    }

    // PIP 진입/복귀로 메모 패널이 다른 창(document)으로 이동했을 때,
    // 현재 선택을 유지하면서 드롭박스를 그 document 기준으로 다시 만든다.
    // (옆에 띄우기 상태에서 임시저장한 메모가 메인 창 드롭박스에 안 보이던 문제 해결)
    function restoreMemoDropdowns(cat, memo) {
      refreshCategoryDropdown();
      if (cat) {
        memoCategorySelect.value = cat;
        if (memoCategorySelect.value === cat) {
          refreshPresetDropdown();
          if (memo) {
            memoPresetSelect.value = memo;
            if (memoPresetSelect.value === memo) memoPresetDelete.disabled = false;
          }
        }
      }
    }

    // 브라우저 PIP 창에서 원래 사이드바로 복귀 (Electron에서는 사용 안 함)
    function returnFromPip() {
      if (!memoPanel) return;
      // PIP 모드면 (Electron 자체 창) 그대로 둠
      if (isInPipMode) return;

      // 이동 전, 현재 선택 상태를 기억 (PIP에서 저장/선택한 값 유지)
      const prevCat = memoCategorySelect.value;
      const prevMemo = memoPresetSelect.value;

      document.body.appendChild(memoPanel);
      document.body.classList.remove('pip-mode');
      memoPanel.classList.remove('active');
      pipWindow = null;

      // 패널이 메인 창(다른 document)으로 돌아왔으므로 드롭박스를 메인 document 기준으로 다시 생성
      restoreMemoDropdowns(prevCat, prevMemo);
    }

    // Electron PIP 창이 닫혔을 때 알림 받기 (메인 창에서만)
    if (isElectronApp && !isInPipMode && window.electronAPI.onPipClosed) {
      window.electronAPI.onPipClosed(() => {
        // 메인 창에서는 별도 처리 없음 (사이드바는 이미 닫혀있음)
        console.log('[Qaid] PIP 창이 닫혔습니다');
      });
    }

    // 헤더의 [🔧 수리메모] / [⚠️ 에스컬레이션] 클릭 시 동작
    function handleTabSwitchFromHeader(tab) {
      // Electron PIP 창 안에 있는 경우: 탭 전환만
      if (isInPipMode) {
        switchMemoTab(tab);
        return;
      }

      // 브라우저 PIP 창이 열려있는 경우: 그 안에서 탭 전환
      if (pipWindow && !pipWindow.closed) {
        switchMemoTab(tab);
        pipWindow.focus();
        return;
      }

      // 일반 사이드바 모드
      if (memoPanel.classList.contains('active') && currentMemoTab === tab) {
        closeMemoPanel();
      } else {
        openMemoPanel(tab);
      }
    }

    // 이벤트 바인딩 (기존 동작을 PIP 고려해서 수정)
    openMemoBtn.addEventListener('click', () => {
      handleTabSwitchFromHeader('repair');
    });

    openEscalationBtn.addEventListener('click', () => {
      handleTabSwitchFromHeader('escalation');
    });

    // 닫기 버튼: 환경별로 다르게 처리
    memoPanelCloseBtn.addEventListener('click', () => {
      // Electron PIP 창 안에 있는 경우: 창 자체를 닫기 (electronAPI 호출)
      if (isInPipMode && isElectronApp) {
        window.electronAPI.closePipWindow();
        return;
      }
      // 브라우저 PIP 창이 열려있는 경우: 그 창 닫기
      if (pipWindow && !pipWindow.closed) {
        pipWindow.close();
        return;
      }
      // 일반 사이드바 모드
      closeMemoPanel();
    });

    memoBackdrop.addEventListener('click', closeMemoPanel);

    memoTabs.forEach(tab => {
      tab.addEventListener('click', () => switchMemoTab(tab.dataset.tab));
    });

    memoCopyBtn.addEventListener('click', copyMemoText);
    memoClearBtn.addEventListener('click', clearMemoText);
    memoPopoutBtn.addEventListener('click', openInPipWindow);

    // ESC 키: 환경별 처리
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;

      // Electron PIP 창 내부 → 창 닫기
      if (isInPipMode && isElectronApp) {
        window.electronAPI.closePipWindow();
        return;
      }

      // 일반 사이드바 모드 → 사이드바 닫기
      if (memoPanel.classList.contains('active') && !pipWindow) {
        closeMemoPanel();
      }
    });

    // 페이지 로드 시 저장된 상태 복원
    restoreMemoState();

    // 페이지 로드 시 센터 목록 가져오기
    async function loadCenters() {
      try {
        const res = await fetch('/api/centers');
        const centers = await res.json();
        const select = document.getElementById('centerSelect');
        centers.forEach(c => {
          const option = document.createElement('option');
          option.value = c;
          option.textContent = c;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('센터 목록 로드 실패:', err);
        alert('센터 목록을 불러오지 못했습니다. 페이지를 새로고침 해주세요.');
      }
    }
    // ==================== QR 모바일 사진 업로드 모드 ====================
    // 핸드폰에서 QR 스캔으로 ?qr=토큰 으로 접속한 경우
    const qrTokenFromUrl = urlParams.get('qr');
    if (qrTokenFromUrl) {
      // QR 모드: 로그인 화면용 센터 목록 로드 생략하고 바로 사진 업로드 모드로
      enterQrUploadMode(qrTokenFromUrl);
    } else {
      // 일반 모드: 로그인 화면 센터 목록 로드
      loadCenters();
    }

    async function enterQrUploadMode(token) {
      try {
        // 토큰 검증 → 센터 정보 받기
        const res = await fetch('/api/qr/verify?token=' + encodeURIComponent(token));
        const data = await res.json();

        if (!data.success || !data.center) {
          showQrError(data.message || 'QR이 만료되었거나 잘못되었습니다.');
          return;
        }

        const center = data.center;

        // 자동 입장 (QR 토큰으로 인증, 비밀번호 불필요)
        // 이름은 "QR", 역할은 고객대기실(service)로 자동 설정
        myCenter = center;
        myName = 'QR';
        myRole = 'service';
        myPassword = ''; // QR 모드는 비번 없음

        // 채팅 화면 대신 "사진 전용 업로드 화면" 표시
        showQrUploadScreen(center, token);
      } catch (err) {
        console.error('[QR 모드] 진입 실패:', err);
        showQrError('연결에 실패했습니다. 다시 시도해주세요.');
      }
    }

    function showQrError(msg) {
      document.body.innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;font-family:'Pretendard',-apple-system,sans-serif;padding:32px 24px;text-align:center;background:#F4F6F9;">
          <div style="width:72px;height:72px;border-radius:50%;background:#FEE2E2;display:flex;align-items:center;justify-content:center;font-size:34px;">⚠️</div>
          <div style="font-size:18px;font-weight:700;color:#1A1D24;line-height:1.4;">${msg}</div>
          <div style="font-size:14px;color:#4B5563;line-height:1.5;">PC 화면에서 QR코드를<br>다시 생성해주세요.</div>
        </div>`;
    }

    function showQrUploadScreen(center, token) {
      // socket 연결 + QR 토큰으로 입장
      socket = io();
      socket.on('connect', () => {
        socket.emit('join', { name: myName, role: myRole, center: center, qrToken: token });
      });
      socket.on('error', (msg) => {
        showQrError(msg || '입장에 실패했습니다.');
      });

      // 사진 전용 업로드 화면 (로그인 화면과 동일한 카드형 디자인)
      document.body.style.margin = '0';
      document.body.innerHTML = `
        <div style="min-height:100vh;display:flex;flex-direction:column;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(160deg,#EaF1Fb 0%,#F4F6F9 100%);color:#1A1D24;padding:20px;box-sizing:border-box;">

          <!-- 카드 -->
          <div style="background:#fff;border-radius:24px;box-shadow:0 10px 40px rgba(50,124,219,0.12);padding:28px 24px;margin:auto 0;">

            <!-- 헤더 영역 -->
            <div style="text-align:center;margin-bottom:24px;">
              <div style="width:64px;height:64px;border-radius:18px;background:#327CDB;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 6px 18px rgba(50,124,219,0.35);">
                <span style="font-size:30px;">📷</span>
              </div>
              <div style="font-size:20px;font-weight:700;color:#1A1D24;">${center}</div>
              <div style="font-size:13px;color:#9098A4;margin-top:6px;line-height:1.5;">사진을 찍으면<br>PC 채팅으로 바로 전송됩니다</div>
            </div>

            <!-- 버튼 2개 (로그인 화면의 역할 선택 버튼과 동일 스타일) -->
            <div style="display:flex;gap:12px;margin-bottom:8px;">
              <button id="qrTakePhoto" style="flex:1;padding:22px 12px;font-family:inherit;background:#fff;border:1.5px solid #E5E8EC;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:all 0.15s;">
                <span style="font-size:30px;">📷</span>
                <span style="font-size:15px;font-weight:700;color:#1A1D24;">사진 찍기</span>
              </button>
              <button id="qrPickPhoto" style="flex:1;padding:22px 12px;font-family:inherit;background:#fff;border:1.5px solid #E5E8EC;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:all 0.15s;">
                <span style="font-size:30px;">🖼️</span>
                <span style="font-size:15px;font-weight:700;color:#1A1D24;">앨범에서 선택</span>
              </button>
            </div>

            <input type="file" id="qrCameraInput" accept="image/*" capture="environment" style="display:none;" />
            <input type="file" id="qrAlbumInput" accept="image/*" style="display:none;" />

            <div id="qrUploadStatus" style="font-size:14px;font-weight:600;min-height:22px;text-align:center;padding:10px 0 2px;"></div>

            <!-- 전송 목록 -->
            <div id="qrSentWrap" style="display:none;border-top:1px solid #F0F2F5;margin-top:8px;padding-top:16px;">
              <div style="font-size:13px;font-weight:700;color:#4B5563;margin-bottom:10px;">전송한 사진</div>
              <div id="qrSentList" style="display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto;"></div>
            </div>
          </div>

          <!-- 하단 -->
          <div style="text-align:center;font-size:12px;color:#B0B6C0;padding:16px 0 8px;">
            큐에이드 채팅 · 사진 전송
          </div>
        </div>`;

      const cameraInput = document.getElementById('qrCameraInput');
      const albumInput = document.getElementById('qrAlbumInput');
      const statusEl = document.getElementById('qrUploadStatus');
      const sentList = document.getElementById('qrSentList');
      const sentWrap = document.getElementById('qrSentWrap');
      const takeBtn = document.getElementById('qrTakePhoto');
      const pickBtn = document.getElementById('qrPickPhoto');

      // 버튼 눌림/포커스 효과 (로그인 화면 역할버튼처럼 파란 테두리)
      [takeBtn, pickBtn].forEach(btn => {
        btn.addEventListener('touchstart', () => {
          btn.style.borderColor = '#327CDB';
          btn.style.background = '#F4F9FE';
          btn.style.transform = 'scale(0.97)';
        }, { passive: true });
        btn.addEventListener('touchend', () => {
          btn.style.borderColor = '#E5E8EC';
          btn.style.background = '#fff';
          btn.style.transform = 'scale(1)';
        }, { passive: true });
      });

      takeBtn.addEventListener('click', () => cameraInput.click());
      pickBtn.addEventListener('click', () => albumInput.click());
